"title": "leetcode - leetcode 389",
"author": "gihwan319",
"category": "",
"content": "&lt;문제&gt;문자열 s, t가 주어집니다.문자열 t는 문자열 s를 썩은 뒤 랜덤한 한 글자를 임의의 위치에 추가하여 생성 됩니다.t에 추가된 한글자를 반환하시오.&lt;Example1&gt;Input: s = \"abcd\", t = \"abcde\"Output: \"e\"&lt;Example2&gt;Input: s = \"\", t = \"y\"Output: \"y\"&lt;설명&gt;        a~z까지 사용횟수를 저장해줄 26크기의 배열 2개를 선언해 줍니다.            for 문을 통해 \"s\",\"t\" 문자열의 모든 알파뱃의 횟수를 배열에 저장해 줍니다.    횟수는 해당 문자열의 알파벳에 'a' 아스키 코드인 97을 빼주면 해당 알파벳 인덱스가 되고 해당 인덱스를 ++연산자를 이용해 증가 시켜주면 됩니다.            두 배열을 비교하며 값이 다른 배열의 인덱스에 97을더하여 반환해 줍니다.    &lt;Coding&gt;class Solution {    public char findTheDifference(String s, String t) {    \tint[][] alphabet = new int[2][26];    \tfor(int i=0; i&lt;s.length(); ++i) {    \t\t++alphabet[0][s.charAt(i)-97];    \t\t++alphabet[1][t.charAt(i)-97];    \t}    \t++alphabet[1][t.charAt(s.length())-97];    \tfor(int i=0; i&lt;26; ++i)    \t\tif(alphabet[0][i]!=alphabet[1][i])    \t\t\treturn (char)(i+97);    \treturn (char)0;    }}&lt;결과&gt;SuccessDetails Runtime: 1 ms, faster than 99.79% of Java online submissions for Find the Difference.Memory Usage: 40.7 MB, less than 15.81% of Java online submissions for Find the Difference.",
"url": "/leetcode-389"
}

"leetcode-80": {
"title": "leetcode - leetcode 80",
"author": "gihwan319",
"category": "",
"content": "&lt;문제&gt;내림차순으로 정렬된 정수 배열이 주어졌을 때, 각 요소가 최대 두 번 나타나도록 일부 중복을 제거합니다.일부 언어에서는 배열의 길이를 변경하는 것이 불가능하기 때문에 대신 배열 nums의 첫 번째 부분에 결과를 배치해야 합니다.즉 중복을 제거한 후 배열의 마지막 인덱스가 k인 경우 nums의 배열의 0~k-1인덱스 까지는 결과 배열이 되어야 합니다. k인덱스 부터는 해당 인덱스의 값이 무엇이든 신경쓰지 않습니다. 배열 nums에 0~k-1 인덱스에에 최종 결과를 배치한 후 k를 반환합니다. 다른 배열 즉 추가 공간을 할당하지 마십시오. O(1) 추가 메모리를 사용하여 제자리에서 입력 배열을 수정하여 이 작업을 수행해야 합니다.&lt;Example1&gt;Input: nums = [1,1,1,2,2,3]Output: 5, nums = [1,1,2,2,3,_]&lt;Example2&gt;Input: nums = [0,0,1,1,1,1,2,3,3]Output: 7, nums = [0,0,1,1,2,3,3,_,_]&lt;설명&gt;        중복된 값들을 카운트해줄 변수를 선언해 줍니다.            for문을 통해 2번째 인덱스 부터 (주어진 배열의 길이-중복된 갯수의 값)의 인덱스 까지 순차적으로 접근하며 아래의 과정을 반복합니다.                    만약 해당 인덱스의 값과 해당 인덱스-2의 값이 같을 경우 값은 최소 3개 이므로         for 문을 통해 해당 인덱스 다음값들을 해당 인덱스 쪽으로 당깁니다.        카운트를 증가 시켜 줍니다.                        만약 해당 인덱스의 값과 해당 인덱스-2의 값이 같지 않을 경우 다음 인덱스로 넘어갑니다.                        (주어진 배열의 길이-중복된 갯수의 값)을 반환해 줍니다.    &lt;Coding&gt;class Solution {    public int removeDuplicates(int[] nums) {    \tint count=0;    \tfor(int i=2; i&lt;nums.length-count;) {    \t\tif(nums[i-2]==nums[i]) {    \t\t\tfor(int j=i; j&lt;nums.length-count-1; ++j)    \t\t\t\tnums[j]=nums[j+1];                ++count;    \t\t}            else ++i;    \t}        return nums.length-count;    }}&lt;결과&gt;SuccessDetails Runtime: 1 ms, faster than 65.03% of Java online submissions for Remove Duplicates from Sorted Array II.Memory Usage: 42.3 MB, less than 15.08% of Java online submissions for Remove Duplicates from Sorted Array II.",
"url": "/leetcode-80"
}
,

"leetcode-23": {
"title": "leetcode - leetcode 23",
"author": "gihwan319",
"category": "",
"content": "&lt;문제&gt;k 개의 정렬된 LinkedList의 배열이 주어졌을 때, 해당 LinkedList들을 병합 정렬하여 반환하시오.&lt;Example1&gt;Input: lists = [[1,4,5],[1,3,4],[2,6]]Output: [1,1,2,3,4,4,5,6]&lt;Example2&gt;Input: lists = []Output: []&lt;Example3&gt;Input: lists = [[]]Output: []&lt;설명&gt;        반환해줄 LinkedList의 첫 부분인 head를 선언해 줍니다.            for-each를 통해 모든 LinkedList배열에 대하여 아래의 과정을 반복합니다.                    만약 head가 null이면 해당 정렬된 LinkedList를 head로 설정하고 해당 LinkedList를 건너 뜁니다.        이때 해당 LinkedList가 null이라면 다음 LinkedList가 head에 들어 오게 됩니다.                        head가 null이 아니라면 while문을 통해 해당 LinkedList의 각 노드들을 방문해 아래의 과정을 실행 합니다.                                접근한 노드를 저장할 변수를 선언해 줍니다.                                    해당 노드를 삽입하기 위해 head의 리스트의 자리의 전후 노드 즉 head리스트 노드중 삽입노드의 값보다 작지만 가장 큰 값을 가진 노드와 삽입노드의 값보다 크지만 가장 작은 값을 가진 노드를 찾습니다.                                    전의 노드 다음을 삽입노드로 이어주고 삽입 노드 다음을 후의 노드에 이어 줍니다.            이때 전의 노드가 없을 경우 삽입 노드를 head로 바꿔 줍니다.                                            해당 과정이 끝나면 head를 반환해 줍니다.    &lt;Coding&gt;class Solution {    public ListNode mergeKLists(ListNode[] lists) {    \tListNode head = null;        for(ListNode n:lists) {        \tif(head==null) {        \t\thead=n;        \t\tcontinue;        \t}        \twhile(n!=null) {        \t\tListNode node = n;        \t\tn=n.next;        \t\tListNode curr = head;        \t\tListNode prev = new ListNode(0,head);        \t\twhile(curr!=null &amp;&amp; curr.val&lt;node.val) {        \t\t\tcurr=curr.next;        \t\t\tprev=prev.next;        \t\t}        \t\tprev.next=node;    \t\t\tnode.next=curr;    \t\t\tif(curr==head)head=node;        \t}        }        return head;    }}&lt;결과&gt;SuccessDetails Runtime: 88 ms, faster than 19.84% of Java online submissions for Merge k Sorted Lists.Memory Usage: 43.7 MB, less than 59.68% of Java online submissions for Merge k Sorted Lists.",
"url": "/leetcode-23"
}
,

"datastructure-ch03-3": {
"title": "DataStructure - 자료구조Ch.03-3",
"author": "gihwan319",
"category": "",
"content": "자료구조 Ch.02 : 트리이진 트리(Binary Tree)트리의 모든 노드가 최대 두 개의 자식 노드를 가지는 트리를 이진 트리라고 합니다.이때 두 노드는 각각 왼쪽 자식 노드와 오른쪽 자식 노드라고 합니다.&lt;이진 트리의 속성&gt;    각 레벨 l에 있을 수 있는 최대 노드의 수 : 2^(l-1)      높이가 h인 트리에 있을 수 있는 최대 노드의 수 : 2^(h+1)-1      높이가 h인 트리에 있을 수 있는 최소 노드의 수 : h+1      높이가 h인 트리의 노드 수 n의 범위 : h+1&lt;n&lt;2^(h+1)      n개의 노드로 만들 수 있는 트리의 최대 높이 : n-1      n개의 노드로 만들 수 있는 트리의 최소 높이 : log2(n)  &lt;이진 트리의 종류&gt;    포화 이진 트리 : 모든 노드의 자식 수가 0또는 2인 경우      완전 이진 트리 : 마지막 레벨을 제외하면 모두 채워져 있고, 마지막 레벨의 단말 노드는 왼쪽에서 부터 채워진 형태로 되어있는 경우    \t\t모든 중간노드의 자식 수가 2일 때 단말 노드의 수가 n이면 전체 노드의 수는 N = 2n-1\t        완벽 이진 트리 : 모든 중간 노드의 자식 수가 2이며, 모든 다말은 같은 레벨에 있는 경우    \t\t단말 노드의 수가 n이면 전체 노드의 수는 N=2n-1\t\t\t완벽 이진 트리는 항상 완전 이진 트리임\t\t\t완전 이진 트리는 완벽 이진 트리가 아닐 수 있음\t        균형 이진 트리 : 모든 노드의 왼쪽 부분 트리의 높이와 오른쪽 부분 트리의 높이의 차이가 1 이하인 경우    \t\t균형인수 : 오른쪽 부분트리의 높이 - 왼쪽 부분트리의 높이\t    &lt;이진 트리의 순회&gt;    in-order(중위 순회) : 왼쪽 자식노드(L), 내 노드(P), 오른쪽 자식노드(R) 순서로 방문      pre-order(전위 순회) : 내 노드(P), 왼쪽 자식노드(L), 오른쪽 자식노드(R) 순서로 방문      post-order(후위 순회) : 왼쪽 자식노드(L), 오른쪽 자식노드(R), 내 노드(P) 순서로 방문      BFS(너비우선 탐색) : 내 노드(P), 내 노드로부터 깊이 1인 노드들, 내 노드로부터 깊이 2인 노드들, ... , 내 노드로부터 깊이 N인 노드들 (N: 나(트리)의 깊이)  &lt;정리&gt;이진 트리에 대한 구현은 따로 하지않겠습니다.이것으로 이진 트리에 대한 post를 마치고 다음에는 이진 검색 트리에 관한 내용을 post하도록 하겠습니다.",
"url": "/dataStructure-ch03-3"
}
,

"author": "gihwan319",
"category": "",
"content": "&lt;문제&gt;정수 x가 주어졌을 때 x가 좌우대칭인 수이면 참을 반환하시오.좌우대칭인 수란 수를 읽을 때 앞에서 읽으나 뒤에서 읽으나 같은 수를 의미합니다.ex : 121은 좌우대칭인 수이고 123은 좌우대칭인 수가 아닙니다.&lt;Example1&gt;Input: x = 121Output: true&lt;Example2&gt;Input: x = -121Output: false&lt;Example3&gt;Input: x = 10Output: false&lt;설명&gt;        매개변수로 받은 수가 음수이면 false를 반환합니다.    \t    반전된 수를 저장할 변수를 지정해 줍니다.    \t    for문을 이용하여 아래의 과정을 통해 반전된 수를 위의 변수에 저장해 줍니다.    해당 반복문의 조건은 입력 받은 값을 i에 복사하여 해당 i가 0보다 크면 계속 반복합니다.    이때 i는 반복할 때마다 10의 정수나눗셈의 연산을 시행합니다.                    반전된 수에 10을 곱하여 자리 수를 올려줍니다.        이때 처음에는 0이기 때문에 변경 되지 않습니다.                        i를 10으로 나머지 연산하여 반전되 수를 저장하는 변수에 더해 줍니다.                \t    반전된 수와 입력받은 수가 같으면 true아니면 false를 반환해 줍니다.    &lt;Coding&gt;class Solution {\tpublic boolean isPalindrome(int x) {    \tif(x&lt;0)return false;\t\tint r=0;    \tfor(int i=x; i&gt;0; i/=10) {    \t\tr*=10;    \t\tr+=i%10;    \t}    \treturn x==r?true:false;    }}&lt;결과&gt;SuccessDetails Runtime: 6 ms, faster than 99.97% of Java online submissions for Palindrome Number.Memory Usage: 41.7 MB, less than 29.45% of Java online submissions for Palindrome Number.&lt;다른 방법&gt;위의 방법보다는 효율적이지 않지만 다른 방법이 생각이나 같이 적어보겠습니다.&lt;설명&gt;        매개변수로 받은 수가 음수이면 false를 반환합니다.    \t    입력받은 수를 문자열로 변경하여 줍니다.    \t    for문을 이용하여 해당 문자열이 좌우대칭인지 판별해 줍니다.    반복 조건은 (0&lt;i&lt;문자열 길이 나누기 2) 입니다.                    문자열의 i번째와 문자열의 마즈막-i번째의 문자를 비교하여 다르면 false를 반환해 줍니다.                \t    위의 경우에서 끝나지 않으면 좌우대칭인 수이므로 true를 반환합니다.    &lt;Coding&gt;    public boolean isPalindrome(int x) {    \tif(x&lt;0)return false;    \tString s=Integer.toString(x);    \tfor(int i=0; i&lt;s.length()/2; ++i)    \t\tif(s.charAt(i)!=s.charAt(s.length()-i-1))return false;        return true;    }&lt;결과&gt;SuccessDetails Runtime: 7 ms, faster than 84.14% of Java online submissions for Palindrome Number.Memory Usage: 41.9 MB, less than 27.77% of Java online submissions for Palindrome Number.",

}

"datastructure-ch03-2": {
"title": "DataStructure - 자료구조Ch.03-2",
"author": "gihwan319",

"content": "자료구조 Ch.02 : 트리&lt;트리&gt;앞 post에서 본 트리를 간단하게 구현해 보았습니다.해당 트리는 루트 노드의 레벨을 0으로 보았으며 노드의 순서를 레벨순, 좌측에서 우측 순으로 매겨 구현 하였습니다.즉 노드의 순서는  12 3과 같이 아래로 갈 수 록 커지고 우측으로 갈 수 록 커지게 순차적으로 생각해 주시면 됩니다.레벨은 1번 노드의 경우 0이고 2,3번 노드의 경우 1레벨이 됩니다.그럼 아래에서 주요 메소드 트리의 탐색 삽입 삭제를 위주로 살펴보도록 하겠습니다.(코드)import java.util.Iterator;import java.util.Queue;import java.util.Stack;import java.util.LinkedList;import java.util.ArrayList;import java.util.List;class Tree&lt;E&gt; implements Iterable&lt;E&gt;, Cloneable{\tprivate static class Node{\t\tprivate Object item;\t\tprivate int level;\t\tprivate List&lt;Node&gt; childs = new LinkedList&lt;&gt;();\t\tprivate Node(Object value) {\t\t\tthis.item=value;\t\t\tthis.level=0;\t\t}\t}\tprivate Node root = null;\tprivate int size = 0;\tprivate int level = 0;\tprivate List&lt;Node&gt; BFS(Node node){\t\tList&lt;Node&gt; visitedOrder = new ArrayList&lt;&gt;(this.size);\t\tif(this.root==null)return visitedOrder;\t\tQueue&lt;Node&gt; queue = new LinkedList&lt;&gt;();\t\tqueue.add(node);\t\twhile(!queue.isEmpty()) {\t\t\tNode curr=queue.poll();\t\t\tvisitedOrder.add(curr);\t\t\tfor(Node child: curr.childs) if(child!=null)queue.add(child);\t\t}\t\treturn visitedOrder;\t}\t\tprivate List&lt;Node&gt; DFS(Node node){\t\tList&lt;Node&gt; visitedOrder = new ArrayList&lt;&gt;(this.size);\t\tif(this.root==null)return visitedOrder;\t\tStack&lt;Node&gt; stack = new Stack&lt;&gt;();\t\tstack.add(node);\t\twhile(!stack.isEmpty()) {\t\t\tNode curr=stack.pop();\t\t\tvisitedOrder.add(curr);\t\t\tfor(Node child: curr.childs) if(child!=null)stack.add(child);\t\t}\t\treturn visitedOrder;\t}\t\tprivate class TreeIterator implements Iterator&lt;E&gt;{\t\tprivate  int cursor =0;\t\tprivate  List&lt;Node&gt; visitedOrder = BFS(root);\t\t@Override\t\tpublic boolean hasNext() {\t\t\treturn cursor&lt;visitedOrder.size();\t\t}\t\t@Override\t\tpublic E next() {\t\t\treturn (E)visitedOrder.get(cursor++).item;\t\t}\t}\t\tpublic Tree(){\t\tthis.root = null;\t\tthis.size = 0;\t}\t\tpublic Tree(Object[][] arr) {\t\tfor(Object[] l:arr) this.add((int)l[0], l[1]);\t}\t\tpublic boolean isEmpty() {\t\treturn this.size==0?true:false;\t}\t\tpublic int size() {\t\treturn this.size;\t}\t\tpublic void clear() {\t\tthis.root=null;\t\tthis.size=0;\t}\t\tpublic Object get(int nodeNum) {\t\tif(nodeNum&lt;1||nodeNum&gt;size)return null;\t\tList&lt;Node&gt; visitedOrder = BFS(this.root);\t\treturn visitedOrder.get(nodeNum-1);\t}\t\tpublic void set(int nodeNum, Object val) {\t\tif(nodeNum&lt;1||nodeNum&gt;size)return;\t\tList&lt;Node&gt; visitedOrder = BFS(this.root);\t\tvisitedOrder.get(nodeNum-1).item=val;\t}\t\tpublic boolean contains(Object val) {\t\tif(this.isEmpty())return false;\t\tList&lt;Node&gt; visitedOrder = BFS(this.root);\t\tfor(Node n:visitedOrder)if(n.item==val)return true;\t\treturn false;\t}\t\tpublic int nodeNumOf(Object val) {\t\tif(this.isEmpty())return -1;\t\tList&lt;Node&gt; visitedOrder = BFS(this.root);\t\tfor(int i=0; i&lt;visitedOrder.size(); ++i)\t\t\tif(visitedOrder.get(i).item==val)return i+1;\t\treturn -1;\t}\t\tpublic void add(int parentNode, Object val) {\t\tNode newNode = new Node(val);\t\tif(this.isEmpty()) {\t\t\tthis.root=newNode;\t\t\t++this.size;\t\t\treturn;\t\t}\t\tList&lt;Node&gt; visitedOrder = BFS(this.root);\t\tif(0&lt;parentNode&amp;&amp;parentNode&lt;=visitedOrder.size()) {\t\t\tnewNode.level=visitedOrder.get(parentNode-1).level+1;\t\t\tif(newNode.level&gt;this.level)this.level=newNode.level;\t\t\tvisitedOrder.get(parentNode-1).childs.add(newNode);\t\t}\t\t++this.size;\t}\tpublic void remove(Object val) {\t\tList&lt;Node&gt; visitedOrder = DFS(this.root);\t\tfor(int i=0; i&lt;visitedOrder.size(); ++i)\t\t\tif(visitedOrder.get(i).item==val)\t\t\t\tfor(int j=i-1; j&gt;=0;--j)\t\t\t\t\tif(visitedOrder.get(j).level+1==visitedOrder.get(i).level) {\t\t\t\t\t\tfor(Node n:visitedOrder.get(i).childs)\t\t\t\t\t\t\tvisitedOrder.get(j).childs.add(n);\t\t\t\t\t\tvisitedOrder.get(j).childs.remove(visitedOrder.get(i));            --this.size;\t\t\t\t\t\tbreak;\t\t\t\t\t}\t}\tpublic Iterator&lt;E&gt; iterator(){\t\treturn new TreeIterator();\t}\t\tpublic Tree&lt;E&gt; clone() throws CloneNotSupportedException{\t\tTree&lt;E&gt; cloned = new Tree&lt;E&gt;();\t\tList&lt;Node&gt; visitedOrder = BFS(this.root);\t\tcloned.add(0,visitedOrder.get(0).item);\t\tfor(int i=0; i&lt;visitedOrder.size(); ++i) {\t\t\tfor(Node n:visitedOrder.get(i).childs)cloned.add(i+1, n.item);\t\t}\t\treturn cloned;\t}\t\t@Override\tpublic String toString() {\t\tList&lt;Node&gt; visitedOrder = BFS(this.root);\t\tif(visitedOrder.size()==0)return \"null\";\t\tString str=\"\";\t\tint l=0,p=0,count=0;\t\tfor(int i=0; i&lt;visitedOrder.size();++i){\t\t\tif(l!=visitedOrder.get(i).level) {\t\t\t\tstr+=\"\\n\";\t\t\t\tl=visitedOrder.get(i).level;\t\t\t}\t\t\tif(count==0) {\t\t\t\tif(i&gt;0&amp;&amp;visitedOrder.get(p).childs.size()==0) {\t\t\t\t\tstr+=\"(), \";\t\t\t\t\t++p;\t\t\t\t}\t\t\t\tstr+=\"(\";\t\t\t}\t\t\tstr+=visitedOrder.get(i).item;\t\t\tif(i==0)str+=\"), \";\t\t\telse if(count==visitedOrder.get(p).childs.size()-1) {\t\t\t\tstr+=\"), \";\t\t\t\t++p;\t\t\t\tcount=0;\t\t\t}\t\t\telse{\t\t\t\tstr+=\", \";\t\t\t\t++count;\t\t\t}\t\t}\t\treturn str;\t}}(Node 내부 클래스)\tprivate static class Node{\t\tprivate Object item;\t\tprivate int level;\t\tprivate List&lt;Node&gt; childs = new LinkedList&lt;&gt;();\t\tprivate Node(Object value) {\t\t\tthis.item=value;\t\t\tthis.level=0;\t\t}\t}Tree의 Node내부 클래스입니다.해당 노드는 값, 노드의 레벨, 자식노드 리스트를 가지고 구성하고 있습니다.item : 실질적인 데이터를 저장하는 변수입니다.level : 해당 노드가 위치하는 레벨을 저장하는 변수 입니다.childs : 해당 노드가 가지는 자식의 리스트로 해당 트리의 경우 자식의 수가 정해 지지 않음으로 LinkedList를 사용하였습니다.(Tree 멤버변수)\tprivate Node root = null;\tprivate int size = 0;\tprivate int level = 0;Tree의 멤버변수입니다.root : 트리의 최상단 노드를 저장하는 변수로 트리에 1개만이 존재합니다.size : 노드의 갯수를 저장하는 변수입니다.level : 트리의 최대 레벨을 저장하는 변수입니다.(BFS 너비우선 탐색)\tprivate List&lt;Node&gt; BFS(Node node){\t\tList&lt;Node&gt; visitedOrder = new ArrayList&lt;&gt;(this.size);\t\tif(this.root==null)return visitedOrder;\t\tQueue&lt;Node&gt; queue = new LinkedList&lt;&gt;();\t\tqueue.add(node);\t\twhile(!queue.isEmpty()) {\t\t\tNode curr=queue.poll();\t\t\tvisitedOrder.add(curr);\t\t\tfor(Node child: curr.childs) if(child!=null)queue.add(child);\t\t}\t\treturn visitedOrder;\t}Tree를 탐색하는 방법중 너비를 우선으로 탑색하는 메소드입니다.해당 탐색은 너비를 우선으로 탐색을 하므로 각 레벨별로 탐색할 수 있습니다.탐색한 노드의 정보를 저장할 리스트를 선언해 줍니다.이때 해당 리스트는 해당 트리의 노드 갯수 만큼 데이터가 나오므로 해당 트리의 size를 용량으로 잡는 ArrayList로 선언해 줍니다.탐색에 이용할 큐를 선언후 root를 큐에 push해 줍니다.그리고 반복 적으로 아래의 과정을 반복해 줍니다.    큐에서 노드하나를 꺼냅니다.      꺼낸 노드는 탐색한 노드를 저장하는 리스트에 넣어 줍니다.      꺼낸 노드의 자식이 null이 아니면 모두 큐에 넣우 줍니다.  해당 과정을 반복했을 때 각 레벨 별로 모든 노드를 방문하여 데이터를 받아 올 수 있습니다.(DFS 깊이우선 탐색)\tprivate List&lt;Node&gt; DFS(Node node){\t\tList&lt;Node&gt; visitedOrder = new ArrayList&lt;&gt;(this.size);\t\tif(this.root==null)return visitedOrder;\t\tStack&lt;Node&gt; stack = new Stack&lt;&gt;();\t\tstack.add(node);\t\twhile(!stack.isEmpty()) {\t\t\tNode curr=stack.pop();\t\t\tvisitedOrder.add(curr);\t\t\tfor(Node child: curr.childs) if(child!=null)stack.add(child);\t\t}\t\treturn visitedOrder;\t}Tree를 탐색하는 방법중 깊이를 우선으로 탑색하는 메소드입니다.해당 탐색은 깊이를 우선으로 탐색을 하므로 각 간선을 따라 탐색할 수 있습니다.탐색한 노드의 정보를 저장할 리스트를 선언해 줍니다.이때 해당 리스트는 해당 트리의 노드 갯수 만큼 데이터가 나오므로 해당 트리의 size를 용량으로 잡는 ArrayList로 선언해 줍니다.탐색에 이용할 스택 선언후 root를 스택에 push해 줍니다.그리고 반복 적으로 아래의 과정을 반복해 줍니다.    스택에서 노드하나를 꺼냅니다.      꺼낸 노드는 탐색한 노드를 저장하는 리스트에 넣어 줍니다.      꺼낸 노드의 자식이 null이 아니면 모두 스택에 넣우 줍니다.  해당 과정을 반복했을 때 각 간설을 따라 모든 노드를 방문하여 데이터를 받아 올 수 있습니다.(Tree Iterator)\tprivate class TreeIterator implements Iterator&lt;E&gt;{\t\tprivate  int cursor =0;\t\tprivate  List&lt;Node&gt; visitedOrder = BFS(root);\t\t@Override\t\tpublic boolean hasNext() {\t\t\treturn cursor&lt;visitedOrder.size();\t\t}\t\t@Override\t\tpublic E next() {\t\t\treturn (E)visitedOrder.get(cursor++).item;\t\t}\t}Tree의 데이터를 순차적으로 접을 할 수 있게 해주는 클래스입니다.이때 해당 이터레이터는 BFS메소드를 이용하여 리스트를 받아 값을 제공하기 때문에 해당 post에서는 노드의 순서를 레벨순으로 좌측에서 우측 순으로 노드의 순서를 매겼다는 것을 알 수 있습니다.(Tree 생성자)\tpublic Tree(){\t\tthis.root = null;\t\tthis.size = 0;\t}\t\tpublic Tree(Object[][] arr) {\t\tfor(Object[] l:arr) this.add((int)l[0], l[1]);\t}Tree의 생성자입니다.인자가 아무것도 없이 생성될 경우 root는 null이고 size는 0인 트리가 생성됩니다.노드가 있는 트리를 생성해야 할 경우 Object의 2차원 배열을 인자로 받습니다.해당 배열은 부모노드의 순서와 노드에 들어 갈 데이터 쌍을 가지는 배열입니다.해당 배열을 받으면 add메소드를 통해 노드를 트리에 넣어 입력받은 노드가 들어간 트리가 생성 됩니다.(add)\tpublic void add(int parentNode, Object val) {\t\tNode newNode = new Node(val);\t\tif(this.isEmpty()) {\t\t\tthis.root=newNode;\t\t\t++this.size;\t\t\treturn;\t\t}\t\tList&lt;Node&gt; visitedOrder = BFS(this.root);\t\tif(0&lt;parentNode&amp;&amp;parentNode&lt;=visitedOrder.size()) {\t\t\tnewNode.level=visitedOrder.get(parentNode-1).level+1;\t\t\tif(newNode.level&gt;this.level)this.level=newNode.level;\t\t\tvisitedOrder.get(parentNode-1).childs.add(newNode);      ++this.size;\t\t}\t}Tree에 노드를 삽입하는 메소드입니다.해당 메소드는 매개변수로 부모노드로 설정 할 노드의 순서와 삽입하려는 데이터 두개를 받습니다.삽입하려는 데이터로 노드를 생성합니다.이때 만약 트리가 빈트리라면 해당 노드를 루트로 지정해주고 트리의 size를 증가시킨후 종료합니다.1개라도 노드가 존재한다면 BFS를 통해 노드 리스트를 받아 옵니다.해당 부모로 설정 할 노드의 번호가 존재한다면 위에서 생성한 노드의 레벨을 부모 노드의 레벨 +1 한 값으로 설정해 줍니다.이때 설정한 값이 트리의 최대 레벨 보다 높으면 트리의 최대 레벨을 갱신해줍니다.위의 두 과정이 끝나면 부모노드의 자식으로 생성한 노드를 추가해 주고 트리의 size를 증가시킵니다.(remove))\tpublic void remove(Object val) {\t\tList&lt;Node&gt; visitedOrder = DFS(this.root);\t\tfor(int i=0; i&lt;visitedOrder.size(); ++i)\t\t\tif(visitedOrder.get(i).item==val)\t\t\t\tfor(int j=i-1; j&gt;=0;--j)\t\t\t\t\tif(visitedOrder.get(j).level+1==visitedOrder.get(i).level) {\t\t\t\t\t\tfor(Node n:visitedOrder.get(i).childs) {\t\t\t\t\t\t\tList&lt;Node&gt; reLevel = DFS(n);\t\t\t\t\t\t\tfor(Node r:reLevel)--r.level;\t\t\t\t\t\t\tvisitedOrder.get(j).childs.add(n);\t\t\t\t\t\t}\t\t\t\t\t\tvisitedOrder.get(j).childs.remove(visitedOrder.get(i));\t\t\t\t\t\t--this.size;\t\t\t\t\t\tbreak;\t\t\t\t\t}\t}Tree에 노드를 삭제하는 메소드입니다.우선 해당 트리에 매개변수로 받은 데이터가 존재하는지 확인 해야하므로 트리를 탐색하여 리스트를 받아 옵니다.이때 삭제 메소드의 경우 노드의 순서를 고려하는 것이 아닌 삭제 노드의 부모노드를 고려하여기 때문에 DFS를 이용하여 리스트를 받아 왔습니다.해당 리스트를 선형 검색하여 매개변수로 받은 데이터의 노드가 있다면 해당 노드의 인덱스 좌측에 해당 노드의 부모 노드가 존재하기 때문에 해당 노드의 인덱스-1부터 처음으로 해당 노드 보다 레벨이 1작은 노드를 찾습니다.부모노드를 찾으면 삭제할 노드의 자식들을 모두 DFS를 통해 아래의 서브트리를 리스트로 받아 해당 노드들을 모드 레벨을 낮춘다음 부모노드에 옮겨 준 후 삭제할 노드를 삭제후 트리의 size를 감소시켜 줍니다.&lt;정리&gt;이번 post에서는 트리의 전체적인 개념을 포괄하고 있는 트리를 간략하게 구현해 보았습니다.다음 post에서는 트리의 한 종류인 이진트리에 대한 내용을 다루어 보도록 하겠습니다.",
"url": "/dataStructure-ch03-2"
}

"content": "&lt;문제&gt;m X n 의 정수 좌표의 계좌가 주어집니다.이때 이 계좌 account[i][j]는 i번째 고객이\u001c j에 보유한 재산의 금액입니다.가장 부유한 고객이 가지고 있는 금액을 반환하시오.고객의 재산은 모든 은행 계좌에 있는 금액입니다.가장 부유한 고객은 최대의 금액을 가진 고객입니다.&lt;Example1&gt;Input: accounts = [[1,2,3],[3,2,1]]Output: 6&lt;Example2&gt;Input: accounts = [[1,5],[7,3],[3,5]]Output: 10&lt;Example3&gt;Input: accounts = [[2,8,7],[7,1,3],[1,9,5]]Output: 17&lt;설명&gt;        최대 금액을 저장하는 변수를 선언합니다.    \t    for문을 통해 각 손님들의 계좌를 선형적으로 방문합니다.    \t    해당 for문 안에 모든 금액을 더한 값을 저정할 변수를 선언합니다.    \t    2중 for문으로 i번째 손님의 금액을 선형적으로 접근하여 값을 더해줍니다.    \t    만약 최대 금액 보다 해당 손님의 금액이 크다면 최대 금액 값을 바꿔 줍니다.    \t    최대 금액 값을 반환해 줍니다.    &lt;Coding&gt;class Solution {    public int maximumWealth(int[][] accounts) {    \tint max=0;        for(int[] i:accounts) {        \tint money=0;        \tfor(int j:i) money+=j;        \tif(money&gt;max)max=money;        }        return max;    }}&lt;결과&gt;SuccessDetails Runtime: 0 ms, faster than 100.00% of Java online submissions for Richest Customer Wealth.Memory Usage: 43.6 MB, less than 5.42% of Java online submissions for Richest Customer Wealth.",

"leetcode-189": {
"title": "leetcode - leetcode 189",
"author": "gihwan319",
"category": "",
"content": "&lt;문제&gt;양수 k와 배열이 주어 졌을 때, 배열을 오른쪽으로 k번 회전 시키시오.&lt;Example1&gt;Input: nums = [1,2,3,4,5,6,7], k = 3Output: [5,6,7,1,2,3,4]&lt;Example2&gt;Input: nums = [-1,-100,3,99], k = 2Output: [3,99,-1,-100]&lt;설명&gt;    \t회전 시킨 배열을 저정할 배열을 선언해 줍니다.\t\t\tfor문을 이용하여 뒤에서 k번째 부터 시작하여 우측으로 모든 값들을 아래의 방식으로 접근하여 선언한 배열에 옮겨 줍니다.\t\t\t\t\t기존 배열의 길이 만큼 회전을 하면 동일한 배열이 나오기 때문에 회전은 k에 기존 배열의 길이 만큼 나머지 연산을 해준 만큼만 하면 됩니다.\t\t그러므로 k에 기존 배열의 길이 만큼 나머지 연산을 해 줍니다.\t\t\t\t\t\t위에서 나머지 연산한 k 값을 기존 배열의 길이 에서 빼주면 회전하였을 때 가장 앞에 와야 할 값의 인덱스가 됩므로 기존 배열의 길이 에서 나머지 연산한 k를 빼줍니다.\t\t\t\t\t\t위에서 뺀 값부터 i번째 까지 탐색합니다.\t\t이때 기존 배열의 인덱스를 넘어가므로 넘어갔을 때, 처음 인덱스로 가기 위해 기존배열의 길이로 나머지 연살을 해줍니다.\t\t\t\t\t\t지금 까지의 방식을 옮길 배열의 i 번째에 모두 넣어 줍니다.\t\t\t\t\t\t\t최종적으로 옮긴 배열의 값을 기존 배열에 다시 옮겨 넣어 줍니다.\t&lt;Coding&gt;class Solution {    public void rotate(int[] nums, int k) {        int[] rotateNums= new int[nums.length];        for(int i=0; i&lt;nums.length; ++i)        \trotateNums[i]=(nums[(nums.length-(k%nums.length)+i)%nums.length]);        for(int i=0; i&lt;nums.length; ++i)nums[i]=rotateNums[i];    }}&lt;결과&gt;SuccessDetails Runtime: 1 ms, faster than 76.47% of Java online submissions for Rotate Array.Memory Usage: 57.6 MB, less than 53.10% of Java online submissions for Rotate Array.",
"url": "/leetcode-189"
}

"leetcode-902": {
"title": "leetcode - leetcode 902",
"author": "gihwan319",
"category": "",
"content": "&lt;문제&gt;각 막대의 너비가 1인 히스토그램의 막대 높이를 나타내는 정수 높이 배열이 주어졌을 때, 히스토그램에서 가장 큰 사각형의 면적을 반환하시오.&lt;Example1&gt;Input: heights = [2,1,5,6,2,3]Output: 10&lt;Example2&gt;Input: heights = [2,4]Output: 4&lt;설명&gt;        가장 큰 넓이를 저장할 변수를 지정해 줍니다.    \t    for문을 통해 각 히스토그램 값에 선형적으로 접근하여 아래의 과정을 반복해 줍니다.\t이때 앞의 히스토그램의 값이 크면 무조건 뒤의 검사결과는 넓이가 작기 때문에 건너 뒵니다.\t또한 해당 히스토그램의 값을 끝까지 다 더하여도 최댓가 보다 작다면 무조건 최댓값 보다 넓이가 작기 때문에 건너 뜁니다.\t\t\t\t\ti번째의 히스토그램에 대한 각 넓이를 저장할 변수를 지정해 줍니다.\t\t\t\t\t\tfor문을 이용하여 i+1번째 부터 우측으로 가며 아래의 과정을 통해 사각형 넓이를 계산해줍니다.\t\t\t\t\t\t\t\ti~j까지의 히스토그램에 대한 넓이가 max 값보다 크다면 max값을 해당 넓이로 바꿔줍니다.\t\t\t\t\t\t\t\t\tj번째의 히스토그램값에 끝인덱스-i를 한 넓이가 max 보다 작다면 뒤의 값이 어떻게 나와도 max 보다 작을 수 밖에 없이 때문에 해당 반복문을 종료 합니다.\t\t\t\t\t\t\t\t\t만약 i~j-1까지의 히스토그램 값중 가장 작은 값보다 j의 값이 크다면 넓이에 지금까지 가장 작은 값을 더해줍니다.\t\t\t\t\t\t\t\t\t위의 경우가 아니라면 넓이를 j의 히스토그램 값에 (j-i)를 곱한 값으로 바꿔줍니다.\t\t\t\t\t\t\t\t\t\t\t위의 반복문이 종료되면 마즈막 넓이 값을 max와 비교해 max 값을 바꿔 줍니다.\t\t\t\t\t\t최종적으로 가장큰 넓이 max 값을 반환해 줍니다.\t&lt;Coding&gt;class Solution {    public int largestRectangleArea(int[] heights) {    \tint max=0;    \tfor(int i=0; i&lt;heights.length; ++i) {    \t\tif(i&gt;0&amp;&amp;heights[i]&lt;=heights[i-1]||heights[i]*(heights.length-i)&lt;=max)continue;    \t\tint area=heights[i];    \t\tfor(int j=i+1; j&lt;heights.length; ++j) {                if(area&gt;max)max=area;    \t\t\tif(heights[j]*(heights.length-i)&lt;=max)break;    \t\t\tif(area&lt;heights[j]*(j-i)) area+=area/(j-i);    \t\t\telse area=heights[j]*(j-i+1);    \t\t}    \t\tif(area&gt;max)max=area;    \t}    \treturn max;    }}&lt;결과&gt;SuccessDetails Runtime: 2366 ms, faster than 5.06% of Java online submissions for Largest Rectangle in Histogram.Memory Usage: 55.6 MB, less than 47.41% of Java online submissions for Largest Rectangle in Histogram.",
"url": "/leetcode-902"
}

"datastructure-ch03-1": {
"title": "DataStructure - 자료구조Ch.03-1",
"author": "gihwan319",
"category": "",
"content": "자료구조 Ch.02 : 트리&lt;트리&gt;트리 구조는 그래프의 한 종류입니다.그래프는 노드와 간선으로 이루어 집니다.이때 각 노드에서 다른 노드로 가는 경로가 유일한 그래프 즉 주기 없이 연결된 그래프를 트리라고 부릅니다.트리에서 최상위 노드를 루트 노드라고 칭합니다.이때 트리에서 루트는 있을 수 도 있고 없을 수도 있지만 흔히 우리가 접하는 대부분의 트리는 루트가 있습니다.루트 노드 부터 각 노드들은 여러개의 자식 노드를 가질 수 있습니다.트리의 노드 수가 n(&gt;0)이면 간선의 수는 n-1입니다.&lt;트리 용어&gt;(출처 : https://itwiki.kr/w/트리)트리는 항상 루트 노드에서부터 시작됩니다.루트는 자식 노드를 가지며, 간선으로 연결되어 있다.자식 노드의 개수는 차수라고 하며, 크기는 자신을 포함한 모든 자식 노드의 개수입니다.높이는 현재 위치에서부터 단말(리프)까지의 거리, 깊이는 루트에서부터 현재 노드까지의 거리입니다. 트리는 그 자식도 트리인 서브트리 구성을 가지므로 제귀구조를 가지고 있다고도 합니다.레벨은 0에서부터 시작하는 시작합니다.사용하는 곳에 따라 1에서부터 시작하는 경우도 있으나 대부분의 문서에서는 0에서부터 시작하는 것이 좀 더 일반적이므로 저도 0부터 시작하는 것으로 하겠습니다.트리는 항상 단방향이기 때문에, 간선의 화살표는 생략 가능합니다.그림에서도 마찬가지로 생략해서 표현했고 일반적으로 방향은 위에서 아래로 향합니다.&lt;트리 탐색/ 순회&gt;트리는 앞 post에서 본 자료구조처럼 선형적인 구조를 가지고 있지 않아 선형 검색을 할 수 없습니다.그러므로 트리에서는 앞의 post와 다르게 탐색을 하게 됩니다.트리의 탐색에는 깊이우선탐색(DFS), 너비우선탐색(BFS) 2가지가 있습니다.    깊이 우선 탐색(DFS)          1. 스택에 루트 노드를 push합니다.            2. 스택이 비어 있으면 종료하고, 비어 있지 않으면 스택에서 노드를 pop하고, 해당 노드 i를 방문합니다.            3. 노드 i가 중간 노드이면 자식 노드를 모두 스택에 저장합니다.            4. 2번째와 같은 과정을 다시 반복합니다.            너비 우선 탐색(BFS)          1. 루트 노드를 큐에 push합니다.            2. 큐가 비어 있으면 종료하고, 아니면 큐에서 노드를 pop하고, 해당 노드 i를 방문합니다.            3. 노드 i가 중간 노드이면 자식 노드를 모두 큐에 저장합니다.            4. 2번째와 같은 과정을 다시 반복합니다.        이것으로 이번 post는 마무리하고 다음은 트리를 간단히 구현하여 post하도록 하겠습니다.",
"url": "/dataStructure-ch03-1"
}

"leetcode-3": {
"title": "leetcode - leetcode 3",
"author": "gihwan319",
"category": "",
"content": "&lt;문제&gt;문자열 s가 주어졌을 때, 문자를 반복하지 않는 가장 긴 부분의 문자열의 길이를 반환하시오.&lt;Example1&gt;Input: s = \"abcabcbb\"Output: 3&lt;Example2&gt;Input: s = \"bbbbb\"Output: 1&lt;Example3&gt;Input: s = \"pwwkew\"Output: 3&lt;설명&gt;        부분 문자열을 저장할 리스트를 생성합니다.\t이때 해당 부분 문자열은 최대 문자열의 길이 만큼 나올 수 있기 때문에 ArrayList를 사용하였습니다.            부분 문자열의 길이를 저장할 변수와 부분 문자열을 접근할 인덱스 변수를 0으로 선언해 줍니다.            위에서 선언한 변수들을 통해 아래의 과정을 반복하는 while 반복문을 실행합니다.\t    \t\t\t선언된 인덱스를 이용해 해당 문자열을 선형검색 하며 각 단어들을 부분 문자열 리스트에 넣습니다.\t\t이때 만약 중복되는 문자가 있으면 선형검색을 중지합니다.\t\t\t\t\t\t위의 과정에서 생성된 부분 문자열을 이용해 부분 문자열의 길이를 저장하는 변수에 기존에 저장되있는 값보다 크다면 교체해 줍니다.\t\t\t\t\t\t만약 인덱스가 문자열의 끝이라면 while 반복문을 종료합니다\t\t그렇지 않으면 인덱스를 중복된 문자 앞으로 변경시켜준 후 새 부분 문자열을 받아야 하므로 부분 문자열 리스트를 비우고 반복을 진행합니다.\t\t\t            최종적으로 부분 문자열의 길이를 반환해 줍니다.    &lt;Coding&gt;class Solution {    public int lengthOfLongestSubstring(String s) {\t\tArrayList&lt;Character&gt; substring = new ArrayList&lt;&gt;(s.length());\t\tint length=0;\t\tint i=0;\t\twhile(true) {\t\t\tfor(; i&lt;s.length(); ++i) {\t\t\t\tif(!substring.contains(s.charAt(i))) substring.add(s.charAt(i));\t\t\t\telse break;\t\t\t}\t\t\tlength=substring.size()&gt;length?substring.size():length;\t\t\tif(i!=s.length()) i-=substring.size()-substring.indexOf(s.charAt(i))-1;\t\t\telse break;\t\t\tsubstring.clear();\t\t}\t\treturn length;    }}&lt;결과&gt;SuccessDetails Runtime: 614 ms, faster than 5.01% of Java online submissions for Longest Substring Without Repeating Characters.Memory Usage: 42.1 MB, less than 25.40% of Java online submissions for Longest Substring Without Repeating Characters.",
"url": "/leetcode-3"
}

"content": "자료구조 Ch.02 : 리스트10. 정리        데이터를 정렬하여 유지 할 수 있고, 정렬하지 않고 유지할 수 있습니다.\t                정렬하지 않으면 삽입을 효과적으로 할 수 있지만 반면에 검색은 선형 검색을 할 수 밖에 없습니다.                        연결구조는 정렬하여 유지하여도 이진 검색을 할 수 없습니다.                        중복 허용 여부                    비정렬의 경우 중복을 허용하지 않으면 삽입을 효과적으로 할 수 있는 이점이 사라지기 때문에 보통 중복을 허용합니다.                        정렬은 중복 허용이 성능에 영향을 주지 않습니다.                \t    배열은 용량이 고정되기 때문에 보통 동적 배열 기법을 사용합니다.                    동적 배열 기법은 보통 용량을 확장해야 할 때 2배로 확장합니다.                        2배로 확장하면 확장 비용을 무시할 수 있지만 최초에 필요한 용량을 파악하고 충분히 확보한 후에 사용하는 것이 효과적입니다.                \t    배열은 임의 접근 할 수 있는 것이 최대 이점이고, 연결구조는 공간이 낭비되지 않고, 초기에 적절한 용량을 확보해야 하는 고민이 없습니다.                    배열은 연속 공간으로 확보되기 때문에 캐싱 측면에서 유리합니다.                \t    리스트는 다른 자료구조를 구현할 때 내부 데이터를 저장하는 용도로도 많이 활용됩니다.\t예를 들어 스택, 큐, 덱, 등 이 있습니다.    \t    배열은 기본적으로 맨 뒤에 삽입/추출이 효과적이고, 연결구조는 맨 앞에 삽입/추출이 효과적입니다.    \t    배열은 삽입 순서를 유지하면서 양방향으로 효과적으로 삽입/추출하고 싶으면 순환 배열 방식을 사용해야 합니다.    \t    연결구조는 양방향으로 효과적으로 삽입/추출하고 싶으면 꼬리 포인터까지 유지하는 이중 연결구조를 사용해야 합니다.    (비교)          ArrayList    SingleLinkedList    DoubleLinkedLIst            비정렬    정렬    비정렬    정렬    비정렬    정렬        onlyhead    withtail    onlyhead    withtail    onlyhead    withtail    onlyhead    withtail        contains    O(n)    O(logn)    O(n)    O(n)    O(n)    O(n)    O(n)    O(n)    O(n)    O(n)        pushFront    O(1)    -    O(1)    O(1)    -    -    O(1)    O(1)    -    -        popFront    O(1)    O(n)    O(1)    O(1)    O(1)    O(1)    O(1)    O(1)    O(1)    O(1)        pushBack    O(1)    -    O(n)    O(1)    -    -    O(n)    O(1)    -    -        popBack    O(1)    O(1)    O(n)    O(n)    O(n)    O(n)    O(n)    O(1)    O(n)    O(1)        add    -    O(n)    -    -    O(n)    O(n)    -    -    O(n)    O(n)        remove    O(n)    O(n)    O(n)    O(n)    O(n)    O(n)    O(n)    O(n)    O(n)    O(n)  종류별 리스트들의 주요 메소드의 시간 복잡도를 정리해 보았습니다.이를 바탕으로 다른 자료구조에서 어떤 리스트를 활용해야 효과적인지 아래에서 살펴 보도록 하겠습니다.&lt;스택&gt;기본적으로 마즈막에 들어간 것이 먼저나오는 LIFO구조를 가지고 있는 자료구조입니다.스택은 동적 배열 기법을 사용하는 비정렬 배열 리스트로 구현하거나 단일 연결 구조 리스트로 구현 하면 효과적입니다.&lt;큐&gt;기본적으로 먼저 들어간 것이 먼저나오는 FIFO구조를 가지고 있는 자료구조입니다.큐는 동적 배열 기법을 사용하는 비정렬 순환 배열 리스트로 구현하거나 꼬리 포인터를 유지하는 단일 연결 구조 리스트로 구현 하는 것이 효과적입니다.&lt;덱&gt;기본적으로 앞뒤 양쪽으로 나오고 들어갈 수 있는 구조를 가지는 자료구조입니다.덱은 동적 배열 기법을 사용하는 비정렬 순환 배열 리스트로 구현하거나 꼬리 포인터를 유지하는 이중 연결 구조 리스트로 구현하는 것이 효과적입니다.이것으로 이번 장을 마무리 하고 다음 부터는 트리에 관한 post를 올리도록 하겠습니다.",

"leetcode-1305": {
"title": "leetcode - leetcode 1305",
"author": "gihwan319",
"category": "",
"content": "&lt;문제&gt;두 이진검색트리(BST) root1, root2가 주어졌을 때, 트리의 모든 값을 오름차순 정렬한 정수 리스트를 반환하시오.&lt;Example1&gt;Input: root1 = [2,1,4], root2 = [1,0,3]Output: [0,1,1,2,3,4]&lt;Example2&gt;Input: root1 = [1,null,8], root2 = [8,1]Output: [1,1,8,8]&lt;설명&gt;        각 트리의 값을 저장할 리스트 2개 visitedOrder1,2를 선언해 줍니다.    이때 각 트리의 노드 갯수를 정확히 알 수 없으므로 LinkedList를 사용합니다.            각 트리를 inorder방식으로 순회하며 정렬된 값을 리스트에 저장합니다.            정렬된 리스트를 병합정렬할 리스트를 새로 선언합니다.    이때 선언하는 리스트는 순회한 리스트들의 길이의 합과 같기 때문에 ArrayList를 사용하여 용량을 합으로 지정해 줍니다.            while문을 통해 각리스트의 처음 값 즉 젤 작은 값들을 비교하여 작은 값을 병합리스트에 넣어 정렬해 줍니다.            최종적으로 정렬된 리스트를 반환해 줍니다.    &lt;Coding&gt;class Solution {\tprivate void inorder(TreeNode curr, List&lt;Integer&gt; visitedOrder) {\t\tif(curr==null)return;\t\tif(curr.left!=null) inorder(curr.left,visitedOrder);\t\tvisitedOrder.add(curr.val);\t\tif(curr.right!=null) inorder(curr.right,visitedOrder);\t}    public List&lt;Integer&gt; getAllElements(TreeNode root1, TreeNode root2) {    \tList&lt;Integer&gt; visitedOrder1 = new LinkedList&lt;&gt;();    \tList&lt;Integer&gt; visitedOrder2 = new LinkedList&lt;&gt;();    \tinorder(root1,visitedOrder1);    \tinorder(root2,visitedOrder2);    \tList&lt;Integer&gt; visitedOrder = new ArrayList&lt;&gt;(visitedOrder1.size()+visitedOrder2.size());    \twhile(!visitedOrder1.isEmpty()&amp;&amp;!visitedOrder2.isEmpty()) {    \t\tif(visitedOrder1.get(0)&gt;visitedOrder2.get(0)) {    \t\t\tvisitedOrder.add(visitedOrder2.get(0));    \t\t\tvisitedOrder2.remove(0);    \t\t}    \t\telse {    \t\t\tvisitedOrder.add(visitedOrder1.get(0));    \t\t\tvisitedOrder1.remove(0);    \t\t}    \t}    \tif(visitedOrder1.isEmpty())for(int i:visitedOrder2)visitedOrder.add(i);    \tif(visitedOrder2.isEmpty())for(int i:visitedOrder1)visitedOrder.add(i);    \treturn visitedOrder;    }}&lt;결과&gt;SuccessDetails Runtime: 16 ms, faster than 64.58% of Java online submissions for All Elements in Two Binary Search Trees.Memory Usage: 41.3 MB, less than 97.05% of Java online submissions for All Elements in Two Binary Search Trees.",
"url": "/leetcode-1305"
}

"author": "gihwan319",

"content": "&lt;문제&gt;정수 배열이 주어졌을 때, 배열이 산모양이라면 true를 반환하시오.다음과 같을 경우에만 배열이 산모양 입니다.        배열의 길이가 3보나 크거나 같다.            i는 (0&lt;i&lt;배열의 길이-1)의 값을 가지는 배열의 인덱스 일때                    arr[0] &lt; arr[1] &lt; ... &lt; arr[i - 1] &lt; arr[i]                        arr[i] &gt; arr[i + 1] &gt; ... &gt; arr[arr.length - 1]                &lt;Example1&gt;Input: arr = [2,1]Output: false&lt;Example2&gt;Input: arr = [3,5,5]Output: false&lt;Example3&gt;Input: arr = [0,3,2,1]Output: true&lt;설명&gt;        배열의 길이가 3보다 작거나 (1번째 값) - (0번째 값)이 0보다 작거나 같으면 시작부터 내리막이니 false를 반환 합니다.            결론 적으로 올라가는 것 1번 내려오는 것 1번을 카운트하면 산모양 배열이라는 것을 알 수 있으므로 올라 가는 것을 카운트 할 변수(upCount)와 내려가는 것을 카운트 할 변수(downCount)를 지정해 주고 올라가는 것과 내려 가는 것을 판단할 변수(prevNum)를 선언해 줍니다.            아래의 내가지 사항을 고려하며 첫 인덱스부터 마즈막 전 인덱스 까지 반복문을 실행합니다.                    (다음 인덱스 값)-(현재 인덱스 값)이 0이면 평탄해 지기 때문에 산모양 배열이 되지 않으므로 false를 반환합니다.                        과거의 (다음 인덱스 값)-(현재 인덱스 값)이 0보다 작어나 같고 현재의 (다음 인덱스 값)-(현재 인덱스 값)이 0보다 크면 올라가는 형태로 변한 것이므로 upCount를 증가시키고 판단 변수인 prevNum에 현재의 (다음 인덱스 값)-(현재 인덱스 값)을 저장해 줍니다.                        과거의 (다음 인덱스 값)-(현재 인덱스 값)이 0보다 크거나 같고 현재의 (다음 인덱스 값)-(현재 인덱스 값)이 0보다 작으면 내려가는 형태로 변한 것이므로 downCount를 증가시키고 판단 변수인 prevNum에 현재의 (다음 인덱스 값)-(현재 인덱스 값)을 저장해 줍니다.                        downCount가 upCount보다 크면 산모양이 거꾸로 되니까 false를 반환해 줍니다.                            위의 반복이 끝나면 오르는 횟수 내리는 횟수가 정해지고 각각 1일 경우 true 아니면 false를 반환해 줍니다.    &lt;Coding&gt;class Solution {    public boolean validMountainArray(int[] arr) {    \tif(arr.length&lt;3||arr[1]-arr[0]&lt;=0)return false;    \tint upCount=0, downCount=0, prevNum=0;    \tfor(int i=0; i&lt;arr.length-1; ++i) {    \t\tif(arr[i+1]-arr[i]==0)return false;    \t\tif(prevNum&lt;=0&amp;&amp;arr[i+1]-arr[i]&gt;0) {    \t\t\t++upCount;    \t\t\tprevNum=arr[i+1]-arr[i];    \t\t}    \t\tif(prevNum&gt;=0&amp;&amp;arr[i+1]-arr[i]&lt;0) {    \t\t\t++downCount;    \t\t\tprevNum=arr[i+1]-arr[i];    \t\t}    \t\tif(downCount&gt;upCount)return false;    \t}    \treturn (upCount==1&amp;&amp;downCount==1)?true:false;    }}&lt;결과&gt;SuccessDetails Runtime: 2 ms, faster than 56.28% of Java online submissions for Valid Mountain Array.Memory Usage: 39.8 MB, less than 82.63% of Java online submissions for Valid Mountain Array.",
"url": "/leetcode-941"
}

"datastructure-ch02-8": {
"title": "DataStructure - 자료구조Ch.02-8",
"author": "gihwan319",
"category": "",
"content": "자료구조 Ch.02 : 리스트9. 정렬 이중연결 리스트(SortedDoubleLinkedList)with tail정렬 단일연결 리스트와 같이 비정렬 이중연결 리스트에서 크게 변하는 것은 없습니다.다른 것은 모두 단일연결 리스트와 같은 방식으로 바꿔주면 되지만 add메소드에서 prev를 고려해 주어야한다는 점이 정렬 단일연결 리스트와의 차이점입니다.(코드)import java.util.Iterator;import java.util.Objects;class SortedDoubleLinkedList&lt;E extends Comparable&lt;E&gt;&gt; implements Iterable&lt;E&gt;, Cloneable{\tprivate static class Node{\t\tprivate Object item;\t\tprivate Node prev=null;\t\tprivate Node next=null;\t\tprivate Node(Object value) {\t\t\tthis.item=value;\t\t}\t}\tprivate Node head = null;\tprivate Node tail = null;\tprivate int size = 0;\t\tprivate class LinkedListIterator implements Iterator&lt;E&gt;{\t\tprivate  int cursor =0;\t\tprivate Node curr=head;\t\t@Override\t\tpublic boolean hasNext() {\t\t\treturn cursor&lt;size;\t\t}\t\t@Override\t\tpublic E next() {\t\t\tObject val=curr.item;\t\t\t++cursor;\t\t\tcurr=curr.next;\t\t\treturn (E)val;\t\t}\t}\t\t@Override\tpublic String toString() {\t\tString str=\"[\";\t\tNode curr=head;\t\tfor(int i=0;i&lt;size;++i) {\t\t\tstr+=curr.item;\t\t\tcurr=curr.next;\t\t\tif(i!=this.size-1) {\t\t\t\tstr+=\", \";\t\t\t}\t\t}\t\treturn str+\"]\";\t}\t\tpublic SortedDoubleLinkedList(){\t\tthis.head = null;\t\tthis.tail = null;\t\tthis.size = 0;\t}\t\tpublic SortedDoubleLinkedList(Object... arr){\t\tfor(int i=arr.length-1;i&gt;=0;--i) {\t\t\tthis.add(arr[i]);\t\t}\t}\t\tpublic boolean isEmpty() {\t\tif(this.size==0)return true;\t\treturn false;\t}\t\tpublic int size() {\t\treturn this.size;\t}\t\tpublic void clear() {\t\tthis.size=0;\t\tthis.head=null;\t\tthis.tail=null;\t}\t\tpublic int indexOf(Object o) {\t\tif(this.isEmpty())return -1;\t\tNode curr=head;\t\tfor(int i=0;i&lt;size;++i) {\t\t\tif(curr.item==o)return i;\t\t\tcurr=curr.next;\t\t}\t\treturn -1;\t}\t\tpublic boolean contains(Object o) {\t\tif(this.isEmpty())return false;\t\treturn this.indexOf(o)!=-1?true:false;\t}\t\tpublic Object get(int index) {\t\tObjects.checkIndex(index, this.size-1);\t\tNode curr=this.head;\t\tfor(int i=0;i&lt;index;++i) curr=curr.next;\t\treturn curr.item;\t}\t\tpublic void set(int index, Object o) {\t\tNode curr = this.head;\t\tfor(int i=0; i&lt;index; ++i) curr=curr.next;\t\tcurr.item=o;\t}\t\tpublic void add(Object val) {\t\tNode newNode = new Node(val);\t\tif(this.isEmpty()) {\t\t\tthis.head=this.tail=newNode;\t\t\t++this.size;\t\t\treturn;\t\t}\t\tNode curr = head;\t\twhile(curr!=null &amp;&amp; ((E)curr.item).compareTo((E)val)&lt;=0) {\t\t\tcurr=curr.next;\t\t}\t\tif(curr==head) {\t\t\tthis.head.prev=newNode;\t\t\tnewNode.next=this.head;\t\t\tthis.head=newNode;\t\t}\t\telse if(curr==null) {\t\t\tthis.tail.next=newNode;\t\t\tnewNode.prev=this.tail;\t\t\tthis.tail=newNode;\t\t}\t\telse{\t\t\tnewNode.next=curr;\t\t\tnewNode.prev=curr.prev;\t\t\tcurr.prev.next=newNode;\t\t\tcurr.prev=newNode;\t\t}\t\t++this.size;\t}\tpublic void popFront() {\t\tif(this.isEmpty())return;\t\tthis.head=this.head.next;\t\tthis.head.prev=null;\t\t--this.size;\t}\tpublic Object peekFront() {\t\treturn head.item;\t}\tpublic void popBack() {\t\tif(this.isEmpty())return;\t\tthis.tail=this.tail.prev;\t\tthis.tail.next.prev=null;\t\tthis.tail.next=null;\t\t--this.size;\t}\t\tpublic Object peekBack() {\t\treturn this.tail.item;\t}\t\tpublic void remove(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\twhile(curr.item!=val) curr=curr.next;\t\tif(curr==this.head) this.popFront();\t\telse if(curr==this.tail) this.popBack();\t\telse{\t\t\tcurr.prev.next=curr.next;\t\t\tcurr.next.prev=curr.prev;\t\t\t--this.size;\t\t}\t}\t\tpublic void removeAll(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\twhile(((E)curr.item).compareTo((E)val)&lt;=0) {\t\t\tif(curr.item!=val) curr=curr.next;\t\t\telse {\t\t\t\tif(curr==this.head)this.popFront();\t\t\t\telse if(curr==this.tail)this.popBack();\t\t\t\telse{\t\t\t\t\tcurr.prev.next=curr.next;\t\t\t\t\tcurr.next.prev=curr.prev;\t\t\t\t\t--this.size;\t\t\t\t}\t\t\t\tcurr=curr.next;\t\t\t}\t\t}\t}\t\tpublic Iterator&lt;E&gt; iterator(){\t\treturn new LinkedListIterator();\t}\t\tpublic SortedDoubleLinkedList&lt;E&gt; clone() throws CloneNotSupportedException{\t\tSortedDoubleLinkedList&lt;E&gt; cloned = new SortedDoubleLinkedList&lt;E&gt;();\t\tfor(E i:this) cloned.add(i);\t\treturn cloned;\t}}(pushFront,pushBack-&gt;add)\tpublic void add(Object val) {\t\tNode newNode = new Node(val);\t\tif(this.isEmpty()) {\t\t\tthis.head=this.tail=newNode;\t\t\t++this.size;\t\t\treturn;\t\t}\t\tNode curr = head;\t\twhile(curr!=null &amp;&amp; ((E)curr.item).compareTo((E)val)&lt;=0) {\t\t\tcurr=curr.next;\t\t}\t\tif(curr==head) {\t\t\tthis.head.prev=newNode;\t\t\tnewNode.next=this.head;\t\t\tthis.head=newNode;\t\t}\t\telse if(curr==null) {\t\t\tthis.tail.next=newNode;\t\t\tnewNode.prev=this.tail;\t\t\tthis.tail=newNode;\t\t}\t\telse{\t\t\tnewNode.next=curr;\t\t\tnewNode.prev=curr.prev;\t\t\tcurr.prev.next=newNode;\t\t\tcurr.prev=newNode;\t\t}\t\t++this.size;\t}리스트에 compareTo 메소드를 통해 크기순으로 정렬하여 객체를 삽입해주는 메소드입니다.단일연결에서의 prev노드를 생성하여 사용한 대신 이중연결에서는 노드 내부의 prev연결을 사용합니다.기존대로 리스트가 비어있을 경우 새로 생성한 노드를 head와 tail로 설정해 주고 비어있지 않다면 해당 노드보다 값이 큰 노드 까지 선형 접근을 합니다.이후 부터는 prev노드를 설정해 주어야하기 때문에 단일연결 리스트와 조금 차이가 있습니다.우선 curr가 head일 경우 curr가 null인 경우 이외의 경우로 나눌 수 있습니다.curr가 head 일 경우 head의 prev를 새로 생성한 노드로 설정해 주고 새로 생성한 노드의 next를 head로 설정해 주고 head를 새로 생성한 노드로 바꿉니다.curr가 null인 경우 curr를 사용 할 수 없므로 tail의 next를 새로 생성한 노드로 설정해 주고 새로 생성한 노드의 prev를 tail로 설정해 주고 새로 생성한 노드를 tail로 설정해 줍니다.이외의 경우는 우선 새로 생성한 노드의 next를 curr로 prev를 curr의 prev로 설정해 주고 curr의 전 노드 즉 prev의 next를 새로 생성한 노드로 curr의 prev를 새로 생성한 노드로 설정해 줍니다.최종적으로 리스트의 사이즈를 증가 시켜줍니다.(정리)\t\t\tcontains\t\tadd\t\tpopFront\t\tpopBack\t\tremove\t\t\t\t\tO(n)\t\t\tO(n)\t\t\tO(1)\t\t\tO(1)\t\t\tO(n)\t\t\t위의 표와 같이 주요 메소드들의 시간 복잡도를 정리해 보았습니다.이전의 정렬 단일연결 리스트와는 다르게 popBackd은 O(1)에 해결 할 수 있으며 정렬 단일 연결 리스트와 마찬가지로 배열기반 리스트와 다르게 인덱스로 접근 할 수 없으므로 이진탐색을 할 수 없어 O(logn)이 아닌 O(n)의 시간복잡도로 실행할 수 밖에 없습니다.리스트에 대한 post는 여기까지만 하고 다음 post에서는 간단한 내용 정리를 하도록 하겠습니다.",
"url": "/dataStructure-ch02-8"
}

"leetcode-520": {
"title": "leetcode - leetcode 520",
"author": "gihwan319",
"category": "",
"content": "&lt;문제&gt;다음 경우 중 하나에 해당하는 경우 단어의 대문자 사용이 올바른 것으로 정의합니다.                    모든 문장이 대문자인 경우 ex : \"USA\"                        모든 문장이 소문자인 경우 ex : \"leetcode\"                        첫 문자만 대문자인 경우 ex : \"Google\"            문자열이 주어졌을 때 대문자 사용이 올바른지를 반환하시오.&lt;Example1&gt;Input: word = \"USA\"Output: true&lt;Example2&gt;Input: word = \"FlaG\"Output: false&lt;설명&gt;        해당 문자열과 해당 문자열을 모두 대문자로 바꾼 것과 같으면 모든 문장이 대문자 이므로 true를 반환합니다.    \t    해당 문자열과 해당 문자열을 모두 소문자로 바꾼 것과 같으면 모든 문장이 소문자 이므로 true를 반환합니다.            해당 문자열과 해당 문자열의 첫문자를 대문자로 바꾸고 나머지 문자열을 소문자로 바꾼것과 같으면 첫 문자만 대문자 이므로 true를 반환합니다.            이외의 경우 false를 반환합니다.    &lt;Coding&gt;class Solution {    public boolean detectCapitalUse(String word) {    \tif(word.toUpperCase()==word||    \t\t\tword.toLowerCase()==word||    \t\t\tword.compareTo(word.substring(0, 1).toUpperCase()+word.substring(1).toLowerCase())==0)    \t\treturn true;        return false;    }}&lt;결과&gt;SuccessDetails Runtime: 2 ms, faster than 59.30% of Java online submissions for Detect Capital.Memory Usage: 37.6 MB, less than 65.22% of Java online submissions for Detect Capital.",
"url": "/leetcode-520"
}

"content": "자료구조 Ch.02 : 리스트8. 비정렬 이중연결 리스트(UnsortedDoubleLinkedList)with tail비정렬 이중연결 리스트는 연결 리스트의 각 노드가 next와 prev 2개를 가지므로 앞뒤로 2번 연결을 하는 구조입니다.이러한 구조 덕분에 앞의 단일 연결에서 prev 임시노드를 지정하여 사용한 메소드들은 prev노드를 따로 생성할 필요없이 기존 노드의 prev를 이용할 수 있습니다.또한 기존 연결리스트의 경우 head에서 tail방향으로 선형적으로 탐색을 할 수 밖에는 없었지만 이제는 tail에서 head방향으로의 선형적 탐색을 할 수 있습니다.(코드)class UnsortedDoubleLinkedList&lt;E&gt; implements Iterable&lt;E&gt;, Cloneable{\tprivate static class Node{\t\tprivate Object item;\t\tprivate Node prev=null;\t\tprivate Node next=null;\t\tprivate Node(Object value) {\t\t\tthis.item=value;\t\t}\t}\tprivate Node head = null;\tprivate Node tail = null;\tprivate int size = 0;\t\tprivate class LinkedListIterator implements Iterator&lt;E&gt;{\t\tprivate  int cursor =0;\t\tprivate Node curr=head;\t\t@Override\t\tpublic boolean hasNext() {\t\t\treturn cursor&lt;size;\t\t}\t\t@Override\t\tpublic E next() {\t\t\tObject val=curr.item;\t\t\t++cursor;\t\t\tcurr=curr.next;\t\t\treturn (E)val;\t\t}\t}\t\t@Override\tpublic String toString() {\t\tString str=\"[\";\t\tNode curr=head;\t\tfor(int i=0;i&lt;size;++i) {\t\t\tstr+=curr.item;\t\t\tcurr=curr.next;\t\t\tif(i!=this.size-1) {\t\t\t\tstr+=\", \";\t\t\t}\t\t}\t\treturn str+\"]\";\t}\t\tpublic UnsortedDoubleLinkedList(){\t\tthis.head = null;\t\tthis.tail = null;\t\tthis.size = 0;\t}\t\tpublic UnsortedDoubleLinkedList(Object... arr){\t\tfor(int i=arr.length-1;i&gt;=0;--i) {\t\t\tthis.pushFront(arr[i]);\t\t}\t}\t\tpublic boolean isEmpty() {\t\tif(this.size==0)return true;\t\treturn false;\t}\t\tpublic int size() {\t\treturn this.size;\t}\t\tpublic void clear() {\t\tthis.size=0;\t\tthis.head=null;\t\tthis.tail=null;\t}\t\tpublic int indexOf(Object o) {\t\tif(this.isEmpty())return -1;\t\tNode curr=head;\t\tfor(int i=0;i&lt;size;++i) {\t\t\tif(curr.item==o)return i;\t\t\tcurr=curr.next;\t\t}\t\treturn -1;\t}\t\tpublic boolean contains(Object o) {\t\tif(this.isEmpty())return false;\t\treturn this.indexOf(o)!=-1?true:false;\t}\t\tpublic Object get(int index) {\t\tObjects.checkIndex(index, this.size-1);\t\tNode curr=this.head;\t\tfor(int i=0;i&lt;index;++i) curr=curr.next;\t\treturn curr.item;\t}\t\tpublic void set(int index, Object o) {\t\tNode curr = this.head;\t\tfor(int i=0; i&lt;index; ++i) curr=curr.next;\t\tcurr.item=o;\t}\t\tpublic void pushFront(Object val) {\t\tNode newNode = new Node(val);\t\tnewNode.next=this.head;\t\tif(isEmpty())this.head=this.tail=newNode;\t\telse this.head.prev=newNode;\t\tthis.head=newNode;\t\t++this.size;\t}\t\tpublic void popFront() {\t\tif(this.isEmpty())return;\t\tthis.head=this.head.next;\t\tthis.head.prev=null;\t\t--this.size;\t}\tpublic Object peekFront() {\t\treturn head.item;\t}\t\tpublic void pushBack(Object val) {\t\tNode newNode = new Node(val);\t\tif(isEmpty())this.head=this.tail=newNode;\t\telse {\t\t\tnewNode.prev=this.tail;\t\t\tthis.tail.next=newNode;\t\t\tthis.tail=newNode;\t\t}\t\t++this.size;\t}\t\tpublic void popBack() {\t\tif(this.isEmpty())return;\t\tthis.tail=this.tail.prev;\t\tthis.tail.next.prev=null;\t\tthis.tail.next=null;\t\t--this.size;\t}\t\tpublic Object peekBack() {\t\treturn this.tail.item;\t}\t\tpublic void remove(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\twhile(curr.item!=val) curr=curr.next;\t\tif(curr==this.head) this.popFront();\t\telse if(curr==this.tail) this.popBack();\t\telse{\t\t\tcurr.prev.next=curr.next;\t\t\tcurr.next.prev=curr.prev;\t\t\t--this.size;\t\t}\t}\t\tpublic void removeAll(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\twhile(curr!=null) {\t\t\tif(curr.item!=val) curr=curr.next;\t\t\telse {\t\t\t\tif(curr==this.head)this.popFront();\t\t\t\telse if(curr==this.tail)this.popBack();\t\t\t\telse{\t\t\t\t\tcurr.prev.next=curr.next;\t\t\t\t\tcurr.next.prev=curr.prev;\t\t\t\t\t--this.size;\t\t\t\t}\t\t\t\tcurr=curr.next;\t\t\t}\t\t}\t}\t\tpublic Iterator&lt;E&gt; iterator(){\t\treturn new LinkedListIterator();\t}\t\tpublic UnsortedDoubleLinkedList&lt;E&gt; clone() throws CloneNotSupportedException{\t\tUnsortedDoubleLinkedList&lt;E&gt; cloned = new UnsortedDoubleLinkedList&lt;E&gt;();\t\tfor(E i:this) cloned.pushBack(i);\t\treturn cloned;\t}}(Node 내부 클래스)\tprivate static class Node{\t\tprivate Object item;\t\tprivate Node prev=null;\t\tprivate Node next=null;\t\tprivate Node(Object value) {\t\t\tthis.item=value;\t\t}\t}이중 연결리스트의 Node내부 클래스입니다.기존 head만을 이용한 단일 연결과 달리 해당 노드의 전 노드읜 prev를 추가하여 이중으로 연결하는 노드입니다.(pushFront)\tpublic void pushFront(Object val) {\t\tNode newNode = new Node(val);\t\tnewNode.next=this.head;\t\tif(isEmpty())this.head=this.tail=newNode;\t\telse this.head.prev=newNode;\t\tthis.head=newNode;\t\t++this.size;\t}리스트의 맨앞에 새로운 값을 추가하는 메소드입니다.단일연결 리스트에서 prev만 고려해 주면 됩니다.해당 리스트가 비어있으면 추가 노드를 head와 tail로 지정해주고 비어 있지 않다면 head의 prev를 추가하는 노드로 지정해줍니다.(popFront)\tpublic void popFront() {\t\tif(this.isEmpty())return;\t\tthis.head=this.head.next;\t\tthis.head.prev=null;\t\t--this.size;\t}리스트의 맨앞의 값을 삭제하는 메소드입니다.단일연결 리스트의 popFront의 head를 next로 옮기는 과정에서 해당 head를 옮긴뒤 prev를 null로 바꿔주면 됩니다.(pushBack)\tpublic void pushBack(Object val) {\t\tNode newNode = new Node(val);\t\tif(isEmpty())this.head=this.tail=newNode;\t\telse {\t\t\tnewNode.prev=this.tail;\t\t\tthis.tail.next=newNode;\t\t\tthis.tail=newNode;\t\t}\t\t++this.size;\t}리스트의 맨뒤에 값을 추가하는 메소드입니다.단일연결 리스트의 pushBack에서 추가하는 노드의 prev를 tail로 지정해주는 것만 추가해 주면 됩니다.(popBack)\tpublic void popBack() {\t\tif(this.isEmpty())return;\t\tthis.tail=this.tail.prev;\t\tthis.tail.next.prev=null;\t\tthis.tail.next=null;\t\t--this.size;\t}리스트의 맨뒤에 값을 삭제하는 메소드입니다.단일연결 리스트의 popBack에서는 맨뒤의 노드를 삭제하고 tail을 전 노드를 찾기 위해 선형검색을 해야 했지만 이중 연결에서는 tail에서 head쪽으로 선형접근을 할 수 있기 때문에 바로 prev노드를 찾을 수 있습니다.그러므로 tail을 tail의 prev로 바꿔 주고 tail의 next를 null 로 바꿔주면 됩니다.(remove)\tpublic void remove(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\twhile(curr.item!=val) curr=curr.next;\t\tif(curr==this.head) this.popFront();\t\telse if(curr==this.tail) this.popBack();\t\telse{\t\t\tcurr.prev.next=curr.next;\t\t\tcurr.next.prev=curr.prev;\t\t\t--this.size;\t\t}\t}리스트의 특정 객체 노드를 삭제하는 메소드입니다.단일연결 리스트의 remove에서는 삭제 노드의 prev 노드를 삭제 노드의 next노드로 이어주기 위해 prev노드를 임시로 생성하였지만 이중연결 리스트에서는 prev를 가지고 있기 때문에 선형 검색을 하여 해당 노드가 head이면 popFront tail 이면 popBack 이외에는 삭제 노드의 prev를 삭제 노드의 next에 이어주면 됩니다.(removeAll)\tpublic void remove(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\twhile(curr.item!=val) curr=curr.next;\t\tif(curr==this.head) this.popFront();\t\telse if(curr==this.tail) this.popBack();\t\telse{\t\t\tcurr.prev.next=curr.next;\t\t\tcurr.next.prev=curr.prev;\t\t\t--this.size;\t\t}\t}리스트의 특정 객체 노드를 모두 삭제하는 메소드입니다.해당 메소드도 위의 remove와 동일하게 변경하면 됩니다.(정리)\t\t\tcontains\t\tpushFront\t\tpopFront\t\tpushBack\t\tpopBack\t\tremove\t\t\t\t\tO(n)\t\t\tO(1)\t\t\tO(1)\t\t\tO(1)\t\t\tO(1)\t\t\tO(n)\t\t\t위의 표와 같이 주요 메소드들의 시간 복잡도를 정리해 보았습니다.기존 단일연결 리스트에서 popBack의 시간복잡도가 O(n)이 었지만 이중연결 리스트로 수정을 하면서 시간 복잡도가 O(1)으로 바뀐 것을 확인 할 수 있습니다.다음 post에서는 정렬 이중연결 리스트를 post 하도록 하겠습니다.",

"content": "&lt;문제&gt;정수는 숫자의 각 자릿수가 이전 자릿수보다 하나 더 많은 경우에만 연속 자릿수를 갖습니다.[low, high] 범위 내에서 연속 숫자를 포함하는 모든 정수의 정렬된 리스트를 반환하시오.&lt;Example1&gt;Input: low = 100, high = 300Output: [123,234]&lt;Example2&gt;Input: low = 1000, high = 13000Output: [1234,2345,3456,4567,5678,6789,12345]&lt;설명&gt;        low의 자릿수(lowNum)를 low에 10 정수나눗셈을 실행하여 산출합니다.    \t    해당 자릿수의 첫째 자리수를 기억할 count를 1로 선언해 줍니다.            반복하여 아래의 과정을 진행해 줍니다.                    리스트에 저장할 수(num)를 0으로 선언해 줍니다.                        해당 num에 대하여 아래의 과정을 low의 자릿수+count/10만큼 반복해 줍니다.                                각 자리의 수를 정해줄 j를 count%10으로 정해줍니다.            이때 j는 각 반복 과정 마다 +1 연산을 해 줍니다.                                    num에 10곱하기 연산을 해줍니다.            처음에는 해당 num 값이 0이므로 아무 영향을 받지 않지만 이후에는 현재의 자릿수를 왼쪽으로 밀어주는 역할을 합니다.                                    num에 j더하기 연산을 해줍니다.            위에서 밀어주는 역할을 했으니 이 과정에서는 +1이된 j의 값을 밀고난 빈 자릿수에 넣어주는 역할을 하게 됩니다.                                    num에 10나머지 연산을 하여 0일경우 해당 반복을 종료하게 됩니다.            해당 리스트의 정수는 앞의 자릿수보다 뒷 자릿수가 1씩 커야 하므로 마즈막에 올 수 있는 수 중 가장 큰 수는 9입니다.            이때 9가 오고 한번더 반복을 진행하게 될 시 10 곱하기 연산을 하며 끝에서 2번째 자리는 9 즉 ...90의 형태의 수가 오게 될것이고 j는 10이므로 더하게 되면 끝은 결국 10의 배수의 형태가 되게 됩니다.            끝은 결코 0이될 수 없으니 10의 나머지 연산이 0이되면 해당 반복은 종료하게 됩니다.                                            위의 과정을 통해 num이 정해지게 되고 num이 해당 범위 내에 있으면 리스트에 포함 시키고 high의 범위를 벗어나게 되면 반복을 종료합니다.                        또한 num의 최대가 123456789이기 때문에 해당 값을 넘어가면 반복이 멈추지 않게 때문에 해당 값이 되면 반복을 종료합니다.                        count값을 증가 시켜 다음 num은 앞자리가 1이 더 큰 수가 오게합니다.        이때 증가시킨후 값이 10의 배수인 경우 앞자리가 0이되기 때문에 한번더 +1연산을 해줍니다.                        위의 반복이 끝나면 리스트를 반환해 줍니다.    &lt;Coding&gt;class Solution {\tpublic List&lt;Integer&gt; sequentialDigits(int low, int high) {        List&lt;Integer&gt; digits = new LinkedList&lt;&gt;();        int count=1;        int lowNum=0;        for(int i=low; i&gt;0; i/=10)++lowNum;        while(true) {        \tint num=0;        \tfor(int i=lowNum+count/10, j=count%10; i&gt;0; --i,++j) {        \t\tnum*=10;        \t\tnum+=j;        \t\tif(num%10==0) {        \t\t\tnum=0;        \t\t\tbreak;        \t\t}        \t}        \tif(num&gt;=low) {        \t\tif(num&lt;=high) digits.add(num);        \t\telse break;        \t}            if(num==123456789)break;        \t++count;        \tif(count%10==0)++count;        }        return digits;    }}&lt;결과&gt;SuccessDetails Runtime: 0 ms, faster than 100.00% of Java online submissions for Sequential Digits.Memory Usage: 36.4 MB, less than 81.52% of Java online submissions for Sequential Digits.",

"content": "자료구조 Ch.02 : 리스트7. 정렬 단일 연결 리스트(SortedSingleLinkedList)with tail정렬 단일연결 리스트의 경우 크게 변하는 것은 없습니다.다만 배열기반의 리스트와의 차이를 확인해 보기위해 해당 post를 준비하였습니다.어떻게 다른지 아래의 코드를 보며 설명하겠습니다.(코드)import java.util.Iterator;import java.util.Objects;class SingleSortedLinkedList&lt;E extends Comparable&lt;E&gt;&gt; implements Iterable&lt;E&gt;, Cloneable{\tprivate static class Node{\t\tprivate Object item;\t\tprivate Node next=null;\t\tprivate Node(Object value) {\t\t\tthis.item=value;\t\t}\t\tprivate Node(Object value, Node n) {\t\t\tthis.item=value;\t\t\tthis.next=n;\t\t}\t\tpublic Node clone() throws CloneNotSupportedException{\t\t\tNode cloned = (Node)super.clone();\t\t\treturn cloned;\t\t}\t}\tprivate Node head = null;\tprivate Node tail = null;\tprivate int size = 0;\t\tprivate class LinkedListIterator implements Iterator&lt;E&gt;{\t\tprivate  int cursor =0;\t\tprivate Node curr=head;\t\t@Override\t\tpublic boolean hasNext() {\t\t\treturn cursor&lt;size;\t\t}\t\t@Override\t\tpublic E next() {\t\t\tObject val=curr.item;\t\t\t++cursor;\t\t\tcurr=curr.next;\t\t\treturn (E)val;\t\t}\t}\t\t@Override\tpublic String toString() {\t\tString str=\"[\";\t\tNode curr=head;\t\tfor(int i=0;i&lt;size;++i) {\t\t\tstr+=curr.item;\t\t\tcurr=curr.next;\t\t\tif(i!=this.size-1) {\t\t\t\tstr+=\", \";\t\t\t}\t\t}\t\treturn str+\"]\";\t}\t\tpublic SingleSortedLinkedList(){\t\tthis.head = null;\t\tthis.tail = null;\t\tthis.size = 0;\t}\t\tpublic SingleSortedLinkedList(Object... arr){\t\tfor(int i=arr.length-1;i&gt;=0;--i) {\t\t\tthis.add(arr[i]);\t\t}\t}\t\tpublic boolean isEmpty() {\t\tif(this.size==0)return true;\t\treturn false;\t}\t\tpublic int size() {\t\treturn this.size;\t}\t\tpublic void clear() {\t\tthis.size=0;\t\tthis.head=null;\t\tthis.tail=null;\t}\t\tpublic int indexOf(Object o) {\t\tif(this.isEmpty())return -1;\t\tNode curr=head;\t\tfor(int i=0;i&lt;size;++i) {\t\t\tif(curr.item==o)return i;\t\t\tcurr=curr.next;\t\t}\t\treturn -1;\t}\t\tpublic boolean contains(Object o) {\t\tif(this.isEmpty())return false;\t\treturn this.indexOf(o)!=-1?true:false;\t}\t\tpublic Object get(int index) {\t\tObjects.checkIndex(index, this.size-1);\t\tNode curr=this.head;\t\tfor(int i=0;i&lt;index;++i) curr=curr.next;\t\treturn curr.item;\t}\t\tpublic void add(Object val) {\t\tNode newNode = new Node(val);\t\tif(this.isEmpty()){\t\t\tthis.head=this.tail=newNode;\t\t\t++this.size;\t\t\treturn;\t\t}\t\tNode curr = head;\t\tNode prev = new Node(null,head);\t\twhile(prev!=tail &amp;&amp; ((E)curr.item).compareTo((E)val)&lt;=0) {\t\t\tcurr=curr.next;\t\t\tprev=prev.next;\t\t}\t\tprev.next=newNode;\t\tnewNode.next=curr;\t\tif(curr==head)head=newNode;\t\tif(prev==tail)tail=newNode;\t\t++this.size;\t}\t\tpublic void popFront() {\t\tif(this.isEmpty())return;\t\tthis.head=head.next;\t\t--this.size;\t\tif(this.isEmpty())this.tail=null;\t}\tpublic Object peekFront() {\t\treturn head.item;\t}\t\tpublic void popBack() {\t\tif(this.isEmpty())return;\t\tNode curr=this.head;\t\tfor(int i=2; i&lt;size; ++i) curr=curr.next;\t\tcurr.next=null;\t\tthis.tail=curr;\t\t--this.size;\t}\t\tpublic Object peekBack() {\t\treturn this.tail.item;\t}\t\tpublic void remove(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\tNode prev=new Node(null);\t\tprev.next=this.head;\t\twhile(curr.item!=val) {\t\t\tcurr=curr.next;\t\t\tprev=prev.next;\t\t}\t\tif(curr==this.head)this.head=this.head.next;\t\tif(curr==this.tail)this.tail=prev;\t\telse prev.next=curr.next;\t\t--this.size;\t}\t\tpublic void removeAll(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\tNode prev=new Node(null);\t\tprev.next=this.head;\t\twhile(((E)curr.item).compareTo((E)val)&lt;=0) {\t\t\tif(curr.item!=val) {\t\t\t\tcurr=curr.next;\t\t\t\tprev=prev.next;\t\t\t}\t\t\telse {\t\t\t\tif(curr==this.head)this.head=this.head.next;\t\t\t\tif(curr==this.tail)this.tail=prev;\t\t\t\telse prev.next=curr.next;\t\t\t\tcurr=curr.next;\t\t\t\t--this.size;\t\t\t}\t\t}\t}\t\tpublic Iterator&lt;E&gt; iterator(){\t\treturn new LinkedListIterator();\t}\t\tpublic SingleSortedLinkedList&lt;E&gt; clone() throws CloneNotSupportedException{\t\tSingleSortedLinkedList&lt;E&gt; cloned = (SingleSortedLinkedList&lt;E&gt;)super.clone();\t\tNode curr=cloned.head;\t\tfor(E i:this) {\t\t\tNode newNode = new Node(i);\t\t\tcurr=newNode;\t\t\tcurr=curr.next;\t\t}\t\treturn cloned;\t}}(pushFront,pushBack-&gt;add)\tpublic void add(Object val) {\t\tNode newNode = new Node(val);\t\tif(this.isEmpty()){\t\t\tthis.head=this.tail=newNode;\t\t\t++this.size;\t\t\treturn;\t\t}\t\tNode curr = head;\t\tNode prev = new Node(null,head);\t\twhile(prev!=tail &amp;&amp; ((E)curr.item).compareTo((E)val)&lt;=0) {\t\t\tcurr=curr.next;\t\t\tprev=prev.next;\t\t}\t\tprev.next=newNode;\t\tnewNode.next=curr;\t\tif(curr==head)head=newNode;\t\tif(prev==tail)tail=newNode;\t\t++this.size;\t}리스트에 compareTo 메소드를 통해 크기순으로 정렬하여 객체를 삽입해주는 메소드입니다.리스트의 값이 삽입해야할 객체 보다 작거나 같을 때 까지 선형적으로 전진하여 리스트의 특정 노드에 도착을 하면 해당 노드의 전 노드의 next를 새로운 객체를 가진 노드와 연결 시키고 해당 노드의 next를 전진하여 도착한 노드에 연결 시켜 줍니다.이때 head의 값보다 삽입 객체의 값이 작은 경우 삽입 객체노드를 head로 바꿔 주고 tail보다 끝 값일 경우 tail을 삽입 객체노드로 바꿔줍니다.최종적으로 노드의 갯수 size를 증가 시켜 줍니다. (생성자)\tpublic SingleSortedLinkedList(Object... arr){\t\tfor(int i=arr.length-1;i&gt;=0;--i) {\t\t\tthis.add(arr[i]);\t\t}\t}연결 리스트의 생성자입니다.비정렬 리스트에서는 인자를 pushFront메소드로 받았지만 정렬 리스트에서는 add롤 통해 객체들을 리스트에 삽입시켜 줍니다.(removeAll)\tpublic void removeAll(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\tNode prev=new Node(null);\t\tprev.next=this.head;\t\twhile(((E)curr.item).compareTo((E)val)&lt;=0) {\t\t\tif(curr.item!=val) {\t\t\t\tcurr=curr.next;\t\t\t\tprev=prev.next;\t\t\t}\t\t\telse {\t\t\t\tif(curr==this.head)this.head=this.head.next;\t\t\t\tif(curr==this.tail)this.tail=prev;\t\t\t\telse prev.next=curr.next;\t\t\t\tcurr=curr.next;\t\t\t\t--this.size;\t\t\t}\t\t}\t}리스트의 특정 객체를 모두 삭제하는 메소드입니다.비정렬 리스트에서의 while문 조건은 curr!=null로서 n개의 노드가 있으면 n개의 노드를 검색해야 했지만 정렬된 리스트 에서는 삭제 객체보다 큰 객체들의 노드에는 접근 하지 않아도 되어 while 문의 조건을 ((E)curr.item).compareTo((E)val)&lt;=0로 바꾸어 주었습니다.(정리)\t\t\tcontains\t\tadd\t\tpopFront\t\tpopBack\t\tremove\t\t\t\t\tO(n)\t\t\tO(n)\t\t\tO(1)\t\t\tO(n)\t\t\tO(n)\t\t\t위의 표와 같이 주요 메소드들의 시간 복잡도를 정리해 보았습니다.여기서 확인 할 수 있는 것은 배열기반의 리스트는 인덱스를 가지고 접근할 수 있기 때문에 이진탐색을 통해 객체의 검색을 O(logn)에 가능하지만 연결 리스트의 경우에는 인덱스의 접근이 아닌 연결에 의존하여 따라가기 때문에 선형검색 즉 O(n)의 시간으로만 검색이 가능하다는 것을 알 수 있었습니다.다음 post에서는 이중연결리스트에 관한 post를 올리도록 하겠습니다.",

"title": "leetcode - leetcode 142",
"author": "gihwan319",

"content": "&lt;문제&gt;LinkedList의 head가 주어졌을때, 순환되는 지점을 반환하시오.만약 순환지점이 없다면 null을 반환 하시오.다음 포인터를 계속 따라가서 다시 도달할 수 있는 노드가 List에 있는 경우 LinkedList에 순환주기가 있습니다.내부적으로 pos는 tail의 next가 연결된 노드의 인덱스를 나타내는 데 사용됩니다.사이클이 없으면 -1입니다.pos는 매개변수로 전달되지 않습니다.&lt;Example1&gt;Input: head = [3,2,0,-4], pos = 1Output: tail connects to node index 1&lt;Example2&gt;Input: head = [1,2], pos = 0Output: tail connects to node index 0&lt;Example3&gt;Input: head = [1], pos = -1Output: no cycle&lt;설명&gt;        모든 노드를 선형검색하여 해당 노드 주소를 HashSet에 넣은뒤 해당 HashSet에 다음 노드가 들어 있는지 확인 후 있으면 해당 노드를 반환해주고 없으면 계속진행 합니다.    \t    모든 노드를 선형검색 해야하므로 O(n)에 시간이 소요되고 HashSet에서 해당 요소를 검색 해야하므로 O(1) 총 O(n)의 시간복잡도로 수행 가능합니다.    &lt;Coding&gt;class Solution {\tpublic ListNode detectCycle(ListNode head) {    \tHashSet&lt;ListNode&gt; visitedSet = new HashSet&lt;&gt;();        while (head != null) {            visitedSet.add(head);            head = head.next;            if(visitedSet.contains(head)) return head;        }        return null;    }}&lt;결과&gt;Success Details Runtime: 3 ms, faster than 24.80% of Java online submissions for Linked List Cycle II.Memory Usage: 40.1 MB, less than 57.54% of Java online submissions for Linked List Cycle II.",
"url": "/leetcode-142"
}

"leetcode-963": {
"title": "leetcode - leetcode 963",
"author": "gihwan319",

"content": "&lt;문제&gt;points[i]=(xi,yi)인 XY 평면좌표의 좌표 배열이 제공됩니다.X 또는 Y 축과 반드시 평행할 필요는 없는 직사각형의 최소 넓이를 반환합니다.그러한 사각형이 없으면 0을 반환합니다.&lt;Example1&gt;Input: points = [[1,2],[2,1],[1,0],[0,1]]Output: 2.00000&lt;Example2&gt;Input: points = [[0,1],[2,1],[1,1],[1,0],[2,0]]Output: 1.00000&lt;Example3&gt;Input: points = [[0,3],[1,2],[3,1],[1,3],[2,1]]Output: 0&lt;설명&gt;        좌표의 갯수가 4개 보다 적을 경우 0을 반환해 줍니다.            가장 작은 직사각형을 찾기위해서는 좌표배열에서 서로 다른 4점 a,b,c,d를 뽑아 선분ab와 선분ac의 각이 수직인지 확인하고 선분db와 선분dc의 각이 수직인지 확인하고 선분ba와 선분bd의 각이 수직인지 확인하여 모두 수직인 경우를 찾아 직사각형을 선별하였습니다.                    서로다른 4점을 뽑기위해 4중 for문을 사용하였고 같은점을 선택하지 않기위해 같을 시 continue를 시켜 주었습니다.                        수직인지 아닌지 확인은 (y2-y1)/(x2-x1) * (y3-y1)/(x3-x1) = -1 즉 두 선분의 기울기의 곱이 -1라는 성질을 이용하였습니다.                        직사각형인 것이 확인이 되었으면 해당 선분ab와 선분ac의 길이를 곱하여 넓이를 구하고 가장 작은 값을 반환해 주었습니다.                &lt;Coding&gt;class Solution {\tpublic double minAreaFreeRect(int[][] points) {\t\tif(points.length&lt;4)return 0;\t\tdouble s=Integer.MAX_VALUE;\t\tfor(int i=0; i&lt;points.length; ++i) {\t\t\tfor(int j=0; j&lt;points.length; ++j) {\t\t\t\tif(i==j)continue;\t\t\t\tfor(int k=0; k&lt;points.length; ++k) {\t\t\t\t\tif(i==k||j==k)continue;\t\t\t\t\tfor(int l=0; l&lt;points.length; ++l) {\t\t\t\t\t\tif(l==i||l==j||l==k)continue;\t\t\t\t\t\tif((points[j][1]-points[i][1])*(points[k][1]-points[i][1])==-(points[j][0]-points[i][0])*(points[k][0]-points[i][0])\t\t\t\t\t\t\t\t&amp;&amp;(points[j][1]-points[l][1])*(points[k][1]-points[l][1])==-(points[j][0]-points[l][0])*(points[k][0]-points[l][0])\t\t\t\t\t\t\t\t&amp;&amp;(points[i][1]-points[j][1])*(points[l][1]-points[j][1])==-(points[i][0]-points[j][0])*(points[l][0]-points[j][0])) {\t\t\t\t\t\t\tdouble ab=Math.sqrt(Math.pow(points[j][0]-points[i][0],2)+Math.pow(points[j][1]-points[i][1],2));\t\t\t\t\t\t\tdouble ac=Math.sqrt(Math.pow(points[k][0]-points[i][0],2)+Math.pow(points[k][1]-points[i][1],2));\t\t\t\t\t\t\ts = (ab*ac)&lt;s?(ab*ac):s;\t\t\t\t\t\t}\t\t\t\t\t}\t\t\t\t\t}\t\t\t}\t\t}\t\treturn s==Integer.MAX_VALUE?0:s;    }}&lt;결과&gt;SuccessDetails Runtime: 190 ms, faster than 5.28% of Java online submissions for Minimum Area Rectangle II.Memory Usage: 39.5 MB, less than 76.54% of Java online submissions for Minimum Area Rectangle II.",
"url": "/leetcode-963"
}

"content": "자료구조 Ch.02 : 리스트6-2. 비정렬 단일 연결 리스트(UnsortedSingleLinkedList)with tail앞의 비정렬 단일 연결 리스트에서는 해당 리스트가 head 만을 가지고 있어 tail을 추가해 보았습니다.tail을 추가하므로서 pushBack과 peekBack을 O(1)의 시간복잡도로 처리할 수 있게 됩니다.아래에서 수정된 부분만 추가설명을 하겠습니다.(코드)import java.util.Iterator;import java.util.Objects;class SingleUnsortedLinkedList&lt;E&gt; implements Iterable&lt;E&gt;, Cloneable{\tprivate static class Node{\t\tprivate Object item;\t\tprivate Node next=null;\t\tprivate Node(Object value) {\t\t\tthis.item=value;\t\t}\t\tpublic Node clone() throws CloneNotSupportedException{\t\t\tNode cloned = (Node)super.clone();\t\t\treturn cloned;\t\t}\t}\tprivate Node head = null;\tprivate Node tail = null;\tprivate int size = 0;\t\tprivate class LinkedListIterator implements Iterator&lt;E&gt;{\t\tprivate  int cursor =0;\t\tprivate Node curr=head;\t\t@Override\t\tpublic boolean hasNext() {\t\t\treturn cursor&lt;size;\t\t}\t\t@Override\t\tpublic E next() {\t\t\tObject val=curr.item;\t\t\t++cursor;\t\t\tcurr=curr.next;\t\t\treturn (E)val;\t\t}\t}\t\t@Override\tpublic String toString() {\t\tString str=\"[\";\t\tNode curr=head;\t\tfor(int i=0;i&lt;size;++i) {\t\t\tstr+=curr.item;\t\t\tcurr=curr.next;\t\t\tif(i!=this.size-1) {\t\t\t\tstr+=\", \";\t\t\t}\t\t}\t\treturn str+\"]\";\t}\t\tpublic SingleUnsortedLinkedList(){\t\tthis.head = null;\t\tthis.tail = null;\t\tthis.size = 0;\t}\t\tpublic SingleUnsortedLinkedList(Object... arr){\t\tfor(int i=arr.length-1;i&gt;=0;--i) {\t\t\tthis.pushFront(arr[i]);\t\t}\t}\t\tpublic boolean isEmpty() {\t\tif(this.size==0)return true;\t\treturn false;\t}\t\tpublic int size() {\t\treturn this.size;\t}\t\tpublic void clear() {\t\tthis.size=0;\t\tthis.head=null;\t\tthis.tail=null;\t}\t\tpublic int indexOf(Object o) {\t\tif(this.isEmpty())return -1;\t\tNode curr=head;\t\tfor(int i=0;i&lt;size;++i) {\t\t\tif(curr.item==o)return i;\t\t\tcurr=curr.next;\t\t}\t\treturn -1;\t}\t\tpublic boolean contains(Object o) {\t\tif(this.isEmpty())return false;\t\treturn this.indexOf(o)!=-1?true:false;\t}\t\tpublic Object get(int index) {\t\tObjects.checkIndex(index, this.size-1);\t\tNode curr=this.head;\t\tfor(int i=0;i&lt;index;++i) curr=curr.next;\t\treturn curr.item;\t}\t\tpublic void pushFront(Object val) {\t\tNode newNode = new Node(val);\t\tnewNode.next=this.head;\t\tif(isEmpty())this.head=this.tail=newNode;\t\telse this.head=newNode;\t\t++this.size;\t}\t\tpublic void popFront() {\t\tif(this.isEmpty())return;\t\tthis.head=head.next;\t\t--this.size;\t\tif(this.isEmpty())this.tail=null;\t}\tpublic Object peekFront() {\t\treturn head.item;\t}\t\tpublic void pushBack(Object val) {\t\tNode newNode = new Node(val);\t\tif(isEmpty())head=tail=newNode;\t\telse{\t\t\tNode curr=this.tail;\t\t\tcurr.next=newNode;\t\t\tthis.tail=newNode;\t\t}\t\t++this.size;\t}\t\tpublic void popBack() {\t\tif(this.isEmpty())return;\t\tNode curr=this.head;\t\tfor(int i=2; i&lt;size; ++i) curr=curr.next;\t\tcurr.next=null;\t\tthis.tail=curr;\t\t--this.size;\t}\t\tpublic Object peekBack() {\t\treturn this.tail.item;\t}\t\tpublic void remove(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\tNode prev=new Node(null);\t\tprev.next=this.head;\t\twhile(curr.item!=val) {\t\t\tcurr=curr.next;\t\t\tprev=prev.next;\t\t}\t\tif(curr==this.head)this.head=this.head.next;\t\tif(curr==this.tail)this.tail=prev;\t\telse prev.next=curr.next;\t\t--this.size;\t}\t\tpublic void removeAll(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\tNode prev=new Node(null);\t\tprev.next=this.head;\t\twhile(curr!=null) {\t\t\tif(curr.item!=val) {\t\t\t\tcurr=curr.next;\t\t\t\tprev=prev.next;\t\t\t}\t\t\telse {\t\t\t\tif(curr==this.head)this.head=this.head.next;\t\t\t\tif(curr==this.tail)this.tail=prev;\t\t\t\telse prev.next=curr.next;\t\t\t\tcurr=curr.next;\t\t\t\t--this.size;\t\t\t}\t\t}\t}\t\tpublic Iterator&lt;E&gt; iterator(){\t\treturn new LinkedListIterator();\t}\t\tpublic SingleUnsortedLinkedList&lt;E&gt; clone() throws CloneNotSupportedException{\t\tSingleUnsortedLinkedList&lt;E&gt; cloned = (SingleUnsortedLinkedList&lt;E&gt;)super.clone();\t\tNode curr=cloned.head;\t\tfor(E i:this) {\t\t\tNode newNode = new Node(i);\t\t\tcurr=newNode;\t\t\tcurr=curr.next;\t\t}\t\treturn cloned;\t}}(맴버변수)private Node head = null;private Node tail = null;private int size = 0;맴버변수는 해당 연결 리스트의 처음과 크기를 나타내는 변수들을 사용하였습니다.head : 연결 리스트의 처음을 나타내는 변수입니다.tail : 연결 리스트의 끝을 나타내는 변수입니다.size : 크기 정보 즉 노드의 갯수를 저장하는 변수 입니다.(생성자)\tpublic SingleUnsortedLinkedList(){\t\tthis.head = null;\t\tthis.tail = null;\t\tthis.size = 0;\t}\t\tpublic SingleUnsortedLinkedList(Object... arr){\t\tfor(int i=arr.length-1;i&gt;=0;--i) {\t\t\tthis.pushFront(arr[i]);\t\t}\t}연결 리스트의 생성자입니다.SingleUnsortedLinkedArrayList() : 인자를 받지 않고 생성하는 경우 head와 tail는 null 로 size는 0으로 초기화 하여 생성합니다.SingleUnsortedLinkedArrayList(Object... arr) : 값을 인자로 받아 생성하는 경우 해당 값끝에서 부터 연결리스트 앞에서 부터 차례대로 삽입하여 생성합니다.값을 앞에서 부터 삽입할 때에는 pushFront 메소드를 연속적으로 호출하여 삽입하게 됩니다.(clear)\tpublic void clear() {\t\tthis.size=0;\t\tthis.head=null;\t\tthis.tail=null;\t}리스트를 초기화 해주는 메소드입니다.head와 tail을 null로 size를 0으로 바꾸어줍니다.(pushFront)\tpublic void pushFront(Object val) {\t\tNode newNode = new Node(val);\t\tnewNode.next=this.head;\t\tif(isEmpty())this.head=this.tail=newNode;\t\telse this.head=newNode;\t\t++this.size;\t}리스트의 맨앞에 새로운 값을 추가하는 메소드입니다.인자로 받은 값을 저장한 노드를 생성후 해당 노드를 next를 head로 연결해 준후 head를 생성한 새노드로 지정하고 size를 증가시킵니다.이때 비어있는 리스트에 처음 노드를 생성할 시 해당 노드는 리스트의 head와 tail이 됩니다.(popFront)\tpublic void popFront() {\t\tif(this.isEmpty())return;\t\tthis.head=head.next;\t\t--this.size;\t\tif(this.isEmpty())this.tail=null;\t}리스트의 맨앞의 값을 삭제하는 메소드입니다.head를 head의 next로 바꾼뒤 size를 감소시킵니다.이때 리스트가 빈리스트가 되면 tail을 null로 바꿔줍니다.(pushBack)\tpublic void pushBack(Object val) {\t\tNode newNode = new Node(val);\t\tif(isEmpty())head=tail=newNode;\t\telse{\t\t\tNode curr=this.tail;\t\t\tcurr.next=newNode;\t\t\tthis.tail=newNode;\t\t}\t\t++this.size;\t}리스트의 맨뒤에 새로운 값을 추가하는 메소드입니다.만약 리스트가 비여있다면 새 값을 가진 노드를 생성후 head와 tail로 지정후 size를 증가 시키고 비어있지 않다면 tail의 다음에 새 노드를 연결하고 새노드를 tail로 바꾼후 size를 증가시킵니다.(popBack)\tpublic void popBack() {\t\tif(this.isEmpty())return;\t\tNode curr=this.head;\t\tfor(int i=2; i&lt;size; ++i) curr=curr.next;\t\tcurr.next=null;\t\tthis.tail=curr;\t\t--this.size;\t}리스트의 맨뒤의 값을 삭제하는 메소드입니다.tail의 전 노드까지 선형검색하여 해당 노드의 next를 null로 바꾼후 tail을 해당노드로 바꾸고 size를 감소시킵니다.(peekBack)\tpublic Object peekBack() {\t\treturn this.tail.item;\t}리스트의 맨뒤의 값을 반환하는 메소드입니다.tail의 값을 반환해 줍니다.(remove)\tpublic void remove(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\tNode prev=new Node(null);\t\tprev.next=this.head;\t\twhile(curr.item!=val) {\t\t\tcurr=curr.next;\t\t\tprev=prev.next;\t\t}\t\tif(curr==this.head)this.head=this.head.next;\t\tif(curr==this.tail)this.tail=prev;\t\telse prev.next=curr.next;\t\t--this.size;\t}리스트의 특정 객체 맨앞의 하나를 삭제하는 메소드입니다.indexOf 메소드를 이용해 리스트가 비거나 해당 객체가 리스트에 없으면 return합니다객체가 리스트에 있으면 처음 노드와 해당노드의 전 노드를 선형적으로 해당 객체가 있는 노드까지 접근합니다.해당 위치의 노드가 head이면 head를 head의 next로 바꾸고 tail이면 tail을 prev로 바꾸고 아니면 전 노드의 next를 객체가 있는 노드의 next로 바꾼 후 size를 감소시킵니다.(removeAll)\tpublic void removeAll(Object val) {\t\tif(this.indexOf(val)==-1)return;\t\tNode curr=this.head;\t\tNode prev=new Node(null);\t\tprev.next=this.head;\t\twhile(curr!=null) {\t\t\tif(curr.item!=val) {\t\t\t\tcurr=curr.next;\t\t\t\tprev=prev.next;\t\t\t}\t\t\telse {\t\t\t\tif(curr==this.head)this.head=this.head.next;\t\t\t\tif(curr==this.tail)this.tail=prev;\t\t\t\telse prev.next=curr.next;\t\t\t\tcurr=curr.next;\t\t\t\t--this.size;\t\t\t}\t\t}\t}리스트의 특정 객체를 모두 삭제하는 메소드입니다.indexOf 메소드를 이용해 리스트가 비거나 해당 객체가 리스트에 없으면 return합니다객체가 리스트에 있으면 처음 노드와 해당노드의 전 노드를 선형적으로 마즈막 노드까지 접근합니다.이때 현재의 노드의 값이 특정 객이면 해당 위치의 노드가 head이면 head를 head의 next로 바꾸고 tail이면 tail을 prev로 바꾸고 아니면 전 노드의 next를 객체가 있는 노드의 next로 바꾼 후 size를 감소시킵니다.(정리)\t\t\tcontains\t\tpushFront\t\tpushBack\t\tpopFront\t\tpopBack\t\tremove\t\t\t\t\tO(n)\t\t\tO(1)\t\t\tO(1)\t\t\tO(1)\t\t\tO(n)\t\t\tO(n)\t\t\t위의 표와 같이 주요 메소드들의 시간 복잡도를 정리해 보았습니다.head만 유지했을 때와 비교했을 때 pushBack과 peekBack이 O(1)에 가능한 것을 볼 수 있었습니다.앞으로의 post는 특이사항이 아닌 경우 head와 tail을 모두 유지하는 경우로 작성하도록 하겠습니다.다음 포스트에서는 정렬 단일 연결리스트를 post하도록 하겠습니다.",

}

"content": "&lt;문제&gt;일부는 심어지고 일부는 심어지지 않은 긴 화단이 있습니다.그러나 인접한 구획에는 꽃을 심을 수 없습니다.0과 1을 포함하는 정수 배열 화단이 주어지면 여기서 0은 비어 있음을 의미하고 1은 비어 있지 않음을 의미하고 정수 n은 \"인접 꽃 없음 규칙\"을 위반하지 않고 화단에 n개의 새 꽃을 심을 수 있는 경우 반환합니다.&lt;Example1&gt;Input: flowerbed = [1,0,0,0,1], n = 1Output: true&lt;Example2&gt;Input: flowerbed = [1,0,0,0,1], n = 2Output: false&lt;설명&gt;&bull;n이 0이면 true를 반환합니다.&bull;flowerbed의 길이가 1일때 n이 1이면 true 아니면 false를 반환합니다.&bull;심을 수 있는 자리의 최댓값을 카운트 하기 위해 카운트 변수 num을 0으로 초기화 하고 for문을 통해 flowerbed배열 각 인덱스에 접근을 합니다.&bull;flowerbed의 인덱스의 값이 0일 경우 3가지로 나누어 생각해 볼 수 있습니다.        1. 인덱스가 0일 경우                                1-1. 우측 인덱스 값이 0일 경우 ++num하여 카운트하고 현제 인덱스를 카운트 했으니 다음 인덱스는 카운트 할 수 없으니 다음 인덱스를 건너뛰기 위해 ++i를 해줍니다.                                    1-2. 우측 인덱스 값이 1일 경우 다음 인덱스로 넘어가 확인하게 됩니다.                                2. 인덱스가 마즈막일 경우                                2-1. 좌측 인덱스 값이 0일 경우 ++num하여 카운트합니다.                                    2-2. 좌측 인덱스 값이 1일 경우 확인을 끝냅니다.                                3. 인덱스가 처음과 끝 사이인 경우 좌측과 우측의 값이 0일 경우 ++num하여 카운트하고 다음 인덱스는 카운트 할 수 없으니 다음 인덱스를 건너뛰기 위해 ++i를 해줍니다.    &bull;flowerbed의 인덱스의 값이 1일 경우 다음 인덱스는 카운트 할 수 없으므로 ++i하여 건너뜁니다.&bull;위의 과정들이 끝나면 심을 수 있는 모든 곳의 카운트가 끝났으니 n과 비쿄하여 카운트보다 n이 작거나 같으면 true 아니면 false를 반환하게 됩니다.&lt;Coding&gt;class Solution {\tpublic boolean canPlaceFlowers(int[] flowerbed, int n) {    \tif(n==0)return true;    \tif(flowerbed.length==1) {    \t\tif(flowerbed[0]==0) return n==1?true:false;    \t\telse return false;    \t}    \tint num=0;    \tfor(int i=0; i&lt;flowerbed.length; ++i) {    \t\tif(flowerbed[i]==0) {    \t\t\tif(i==0) {    \t\t\t\tif(flowerbed[i+1]==0) {    \t\t\t\t\t++num;    \t\t\t\t\t++i;    \t\t\t\t}    \t\t\t\telse continue;    \t\t\t}    \t\t\telse if(i==flowerbed.length-1) {    \t\t\t\tif(flowerbed[i-1]==0)++num;    \t\t\t\telse continue;    \t\t\t}    \t\t\telse if(flowerbed[i-1]==0&amp;&amp;flowerbed[i+1]==0) {    \t\t\t\t++num;    \t\t\t\t++i;    \t\t\t}    \t\t}            else ++i;    \t}    \treturn num&gt;=n?true:false;    }}&lt;결과&gt;SuccessDetails Runtime: 1 ms, faster than 92.17% of Java online submissions for Can Place Flowers.Memory Usage: 49.3 MB, less than 24.30% of Java online submissions for Can Place Flowers.",

}
